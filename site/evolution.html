<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Évolution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/shared-menu.css" />
  <link rel="stylesheet" href="./assets/css/shared-ticker.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00000f; font-family: 'Space Mono', 'SF Mono', monospace; overflow: hidden; height: 100vh; width: 100vw; }
    #graph { display: none; }
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: auto auto minmax(180px, 250px) minmax(340px, 1fr);
      grid-template-areas: "countries modes search title";
      align-items: center;
      column-gap: 10px;
      row-gap: 6px;
      padding: 14px 174px 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,15,0.92) 70%, transparent);
      z-index: 20; pointer-events: none;
    }
    #country-tabs { display: flex; gap: 6px; pointer-events: all; grid-area: countries; }
    .tab {
      padding: 5px 14px; border: 1px solid rgba(100,150,255,0.3); border-radius: 3px;
      background: rgba(10,20,50,0.6); color: #7090c0; font-size: 11px;
      letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    }
    .tab:hover  { border-color: rgba(100,150,255,0.7); color: #a0c0ff; }
    .tab.active { background: rgba(40,80,180,0.4); border-color: rgba(120,180,255,0.8); color: #d0e8ff; box-shadow: 0 0 12px rgba(80,130,255,0.3); }
    #title {
      grid-area: title;
      justify-self: end;
      max-width: min(62vw, 900px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Orbitron', 'Space Mono', monospace;
      font-size: clamp(17px, 1.8vw, 30px);
      letter-spacing: clamp(4px, 0.45vw, 10px);
      color: rgba(195, 220, 255, 0.92);
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(90, 140, 255, 0.36),
        0 0 26px rgba(70, 110, 230, 0.22);
      line-height: 1.1;
    }
    #tooltip {
      position: absolute; pointer-events: none;
      background: rgba(2,4,20,0.96); border: 1px solid rgba(80,120,255,0.35);
      border-radius: 4px; padding: 10px 14px; font-size: 12px; line-height: 1.6;
      display: none; z-index: 20; max-width: 220px;
    }
    #tooltip .n { color: #e8f4ff; font-weight: bold; font-size: 13px; }
    #tooltip .s { color: #6090e0; }
    #tooltip .m { color: #408060; }
    #controls {
      position: absolute; bottom: calc(var(--ticker-height, 44px) + 4px); left: 0; right: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, rgba(0,0,15,0.96) 70%, transparent);
      z-index: 10;
    }
    #period-label { text-align: center; font-size: 13px; letter-spacing: 1px; color: #506080; margin-bottom: 10px; }
    #period-label span { color: #90b8e8; }
    #slider-row { display: flex; align-items: center; gap: 14px; }
    #play-btn {
      background: none; border: 1px solid rgba(100,150,255,0.35); border-radius: 3px;
      color: #6080a0; font-size: 14px; padding: 4px 10px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    #play-btn:hover  { border-color: rgba(120,180,255,0.8); color: #b0d0ff; }
    #play-btn.playing { color: #ff8080; border-color: rgba(255,100,100,0.5); }
    #timeline {
      flex: 1; -webkit-appearance: none; height: 2px;
      background: linear-gradient(to right, rgba(60,100,200,0.6), rgba(100,60,200,0.6));
      outline: none; border-radius: 2px; cursor: pointer;
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: #7090ff; box-shadow: 0 0 10px rgba(80,120,255,1), 0 0 20px rgba(80,120,255,0.5); cursor: pointer;
    }
    #speed-btn {
      background: none; border: 1px solid rgba(100,150,255,0.2); border-radius: 3px;
      color: #405060; font-size: 10px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    #speed-btn:hover { color: #7090b0; }
    #top10-panel {
      position: absolute; top: 82px; right: 20px;
      font-family: 'Orbitron', 'Space Mono', monospace;
      z-index: 11;
      width: min(360px, 35vw);
      letter-spacing: 1px;
      border: 1px solid rgba(95, 140, 255, 0.28);
      border-radius: 7px;
      background: linear-gradient(to left, rgba(8,14,40,0.75), rgba(6,10,30,0.48));
      box-shadow: 0 0 20px rgba(60, 100, 210, 0.14);
      padding: 10px 10px 8px;
      backdrop-filter: blur(2px);
    }
    #top10-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #top10-title {
      font-size: 13px;
      color: rgba(182, 208, 255, 0.98);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(78, 125, 245, 0.26);
    }
    #top10-country {
      font-size: 22px;
      color: rgba(200, 224, 255, 0.96);
      text-shadow: 0 0 12px rgba(78, 125, 245, 0.30);
    }
    #top10-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 44vh;
      overflow: auto;
      padding-right: 2px;
    }
    .top10-item {
      width: 100%;
      border: 1px solid rgba(90, 130, 250, 0.18);
      border-radius: 5px;
      background: rgba(8, 18, 48, 0.62);
      color: rgba(176, 206, 255, 0.95);
      text-align: left;
      padding: 7px 9px;
      cursor: pointer;
      transition: all 0.16s ease;
      font-family: 'Space Mono', 'SF Mono', monospace;
      font-size: 11px;
      line-height: 1.35;
    }
    .top10-item:hover {
      border-color: rgba(145, 182, 255, 0.75);
      background: rgba(20, 36, 86, 0.7);
      color: rgba(222, 236, 255, 1);
      transform: translateX(-2px);
    }
    .top10-item.active {
      border-color: rgba(186, 211, 255, 0.95);
      background: rgba(40, 74, 150, 0.42);
      color: rgba(239, 246, 255, 1);
      box-shadow: 0 0 10px rgba(90, 135, 255, 0.32);
    }
    .top10-rank {
      color: rgba(160, 195, 255, 0.88);
      margin-right: 8px;
      font-family: 'Orbitron', 'Space Mono', monospace;
    }
    .top10-score {
      display: block;
      color: rgba(126, 165, 245, 0.9);
      font-size: 10px;
      margin-top: 2px;
    }
    #top10-empty {
      color: rgba(104, 130, 182, 0.9);
      font-size: 11px;
      padding: 6px 2px;
    }
    #stats {
      position: absolute; top: 82px; right: 20px;
      font-family: 'Orbitron', 'Space Mono', monospace;
      font-size: 17px; color: rgba(185, 214, 255, 0.95);
      text-align: right; line-height: 1.7; z-index: 10; pointer-events: none;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(78, 125, 245, 0.30);
      background: linear-gradient(to left, rgba(8,14,40,0.62), rgba(8,14,40,0));
      padding: 8px 10px;
      border-radius: 5px;
      display: none;
    }
    #media-panel {
      position: absolute; top: 82px; left: 20px;
      width: min(290px, 30vw); max-height: 44vh;
      overflow: auto;
      z-index: 11;
      border: 1px solid rgba(95, 140, 255, 0.28);
      border-radius: 7px;
      background: linear-gradient(to right, rgba(8,14,40,0.78), rgba(6,10,30,0.50));
      box-shadow: 0 0 20px rgba(60, 100, 210, 0.14);
      padding: 10px 10px 8px;
      backdrop-filter: blur(2px);
    }
    #media-panel.collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
      padding-bottom: 10px;
    }
    #media-title {
      font-family: 'Orbitron', 'Space Mono', monospace;
      font-size: 12px;
      color: rgba(182, 208, 255, 0.98);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #media-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    #media-toggle {
      border: 1px solid rgba(90,130,250,0.28);
      border-radius: 5px;
      background: rgba(8,18,48,0.62);
      color: rgba(176,206,255,0.95);
      font-family: 'Space Mono', 'SF Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    #media-toggle:hover {
      border-color: rgba(145,182,255,0.75);
      color: rgba(222,236,255,1);
    }
    #media-panel.collapsed #media-body {
      display: none;
    }
    #media-actions { display: flex; gap: 6px; margin-bottom: 8px; }
    .media-action {
      border: 1px solid rgba(90,130,250,0.25);
      border-radius: 5px;
      background: rgba(8,18,48,0.62);
      color: rgba(176,206,255,0.95);
      font-family: 'Space Mono', 'SF Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .media-action:hover { border-color: rgba(145,182,255,0.75); color: rgba(222,236,255,1); }
    #media-help {
      color: rgba(120, 152, 214, 0.88);
      font-size: 10px;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    #media-list { display: flex; flex-direction: column; gap: 6px; }
    .media-item {
      width: 100%;
      border: 1px solid rgba(90,130,250,0.18);
      border-radius: 5px;
      background: rgba(8,18,48,0.62);
      color: rgba(176,206,255,0.95);
      text-align: left;
      padding: 6px 9px;
      cursor: pointer;
      transition: all 0.16s ease;
      font-family: 'Space Mono', 'SF Mono', monospace;
      font-size: 11px;
      line-height: 1.35;
    }
    .media-item:hover {
      border-color: rgba(145,182,255,0.75);
      background: rgba(20,36,86,0.7);
      color: rgba(222,236,255,1);
      transform: translateX(2px);
    }
    .media-item.active {
      border-color: rgba(186,211,255,0.95);
      background: rgba(40,74,150,0.42);
      color: rgba(239,246,255,1);
      box-shadow: 0 0 10px rgba(90,135,255,0.32);
    }
    #media-empty { color: rgba(104,130,182,0.9); font-size: 11px; padding: 6px 2px; }
    #object-panel {
      position: absolute; right: 20px; bottom: calc(var(--ticker-height, 44px) + 92px); width: min(360px, 35vw); max-height: 38vh;
      overflow: auto; padding: 12px 14px; border: 1px solid rgba(80,120,255,0.35);
      border-radius: 6px; background: rgba(3,6,26,0.93); z-index: 12; display: none;
      box-shadow: 0 0 24px rgba(40,70,180,0.15);
    }
    #object-panel.visible { display: block; }
    #object-panel .h { color: #dcecff; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    #object-panel .meta { color: #7f9fd8; font-size: 11px; margin-bottom: 10px; }
    #object-panel .list { display: flex; flex-direction: column; gap: 8px; }
    #object-panel .it {
      display: block; text-decoration: none; border: 1px solid rgba(80,120,255,0.24);
      background: rgba(8,15,46,0.72); border-radius: 4px; padding: 8px 10px;
      color: #aecdff; font-size: 11px; line-height: 1.4;
    }
    #object-panel .it:hover { border-color: rgba(140,180,255,0.72); color: #e3efff; }
    #object-panel .it-media { display: block; color: #4a7aaa; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
    #object-panel .empty { color: #5872a8; font-size: 11px; }
    #object-panel .panel-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    #object-panel .panel-link {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(95,140,255,0.4);
      border-radius: 4px;
      padding: 4px 8px;
      color: #b9d6ff;
      font-size: 10px;
      text-decoration: none;
      background: rgba(10,20,50,0.55);
    }
    #object-panel .panel-link:hover { border-color: rgba(145,182,255,0.8); color: #e3efff; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #00000f; z-index: 100; }
    #loading-text { font-size: 11px; letter-spacing: 3px; color: rgba(80,120,255,0.5); text-transform: uppercase; animation: pulse 1.8s ease-in-out infinite; }
    @media (max-width: 1500px) {
      .menu-discover-hint {
        display: none;
      }
      #header {
        padding-right: 72px;
      }
      #title {
        font-size: clamp(16px, 2vw, 28px);
        letter-spacing: clamp(3px, 0.35vw, 7px);
      }
    }
    @media (max-width: 1220px) {
      #header {
        grid-template-columns: auto auto minmax(180px, 1fr);
        grid-template-areas:
          "countries modes title"
          "search search title";
        align-items: start;
      }
      #title {
        align-self: center;
        max-width: min(46vw, 560px);
      }
      #search-wrap {
        justify-self: start;
        width: min(100%, 420px);
      }
      #search-input {
        width: min(100%, 420px);
      }
    }
    @media (max-width: 900px) {
      #header {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "countries title"
          "modes title"
          "search search";
        align-items: start;
        padding: 10px 72px 10px 10px;
      }
      .side-nav {
        width: 280px;
        right: -280px;
      }
      #country-tabs,
      #mode-tabs {
        flex-wrap: wrap;
      }
      #title {
        max-width: min(44vw, 320px);
        font-size: 13px;
        letter-spacing: 2px;
      }
      #stats {
        top: 74px;
        font-size: 13px;
        padding: 5px 7px;
      }
      #top10-panel {
        top: 72px;
        right: 10px;
        left: 10px;
        width: auto;
        max-width: none;
      }
      #top10-country { font-size: 18px; }
      #top10-title { font-size: 11px; }
      #top10-list { max-height: 30vh; }
      #media-panel {
        top: 72px;
        left: 10px;
        right: 10px;
        width: auto;
        max-height: 20vh;
      }
      #object-panel {
        left: 10px;
        right: 10px;
        width: auto;
        max-height: 30vh;
        bottom: calc(var(--ticker-height, 44px) + 92px);
      }
      #controls { bottom: calc(var(--ticker-height, 44px) + 2px); }
      #search-wrap {
        width: 100%;
      }
      #search-input {
        width: 100%;
      }
    }
    @keyframes menuHintFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    /* Mode tabs */
    #mode-tabs { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; pointer-events: all; grid-area: modes; }
    #mode-tabs-row { display: flex; gap: 4px; }
    #mode-desc { font-size: 9px; letter-spacing: 0.8px; color: rgba(120,160,220,0.45); padding: 0 2px; line-height: 1.2; }
    .mode-tab { padding: 5px 12px; border: 1px solid rgba(100,150,255,0.25); border-radius: 3px; background: rgba(10,20,50,0.5); color: rgba(100,140,200,0.7); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.2px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
    .mode-tab:hover { border-color: rgba(100,150,255,0.6); color: #a0c0ff; }
    .mode-tab[data-mode="ranked"].active { background: rgba(40,80,180,0.35); border-color: rgba(120,180,255,0.7); color: #d0e8ff; box-shadow: 0 0 10px rgba(80,130,255,0.25); }
    .mode-tab[data-mode="tracking"].active { background: rgba(20,72,52,0.38); border-color: rgba(80,200,140,0.65); color: rgba(140,230,185,0.95); box-shadow: 0 0 10px rgba(60,180,110,0.22); }
    /* Track button (panneau articles) */
    .track-btn { display: inline-block; margin: 0 0 8px; padding: 4px 10px; border: 1px solid rgba(100,150,255,0.3); border-radius: 3px; background: rgba(10,20,50,0.5); color: rgba(140,180,255,0.8); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
    .track-btn:hover { border-color: rgba(140,190,255,0.7); color: #c0d8ff; }
    .track-btn.tracked { border-color: rgba(80,200,110,0.5); color: rgba(100,220,130,0.9); background: rgba(15,50,25,0.3); }
    /* Evolution view */
    #evolution-view { position: absolute; inset: 0; display: none; z-index: 5; }
    #evolution-view.visible { display: block; }
    #evo-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #tracked-panel { position: absolute; top: 72px; right: 20px; width: min(290px, 30vw); max-height: calc(100vh - 160px); overflow: hidden; border: 1px solid rgba(95,140,255,0.28); border-radius: 7px; background: linear-gradient(to left, rgba(8,14,40,0.88), rgba(6,10,30,0.70)); box-shadow: 0 0 20px rgba(60,100,210,0.14); padding: 10px; z-index: 11; display: flex; flex-direction: column; gap: 8px; backdrop-filter: blur(2px); }
    #tracked-title { font-family: 'Orbitron','Space Mono',monospace; font-size: 12px; color: rgba(182,208,255,0.98); text-transform: uppercase; letter-spacing: 1px; }
    #tracked-head { display: flex; align-items: center; justify-content: space-between; }
    #tracked-clear { border: 1px solid rgba(90,130,250,0.25); border-radius: 5px; background: rgba(8,18,48,0.62); color: rgba(176,206,255,0.95); font-family: 'Space Mono',monospace; font-size: 10px; padding: 4px 8px; cursor: pointer; }
    #tracked-clear:hover { border-color: rgba(145,182,255,0.75); color: rgba(222,236,255,1); }
    #evo-search { background: rgba(5,10,35,0.75); border: 1px solid rgba(100,150,255,0.3); border-radius: 3px; color: #a0c8f0; font-family: 'Space Mono',monospace; font-size: 11px; outline: none; padding: 5px 10px; width: 100%; transition: border-color 0.2s; }
    #evo-search::placeholder { color: rgba(90,120,180,0.55); }
    #evo-search:focus { border-color: rgba(140,190,255,0.75); color: #d0e8ff; }
    #evo-search-results { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
    .evo-result { padding: 5px 8px; border-radius: 3px; background: rgba(8,18,48,0.62); border: 1px solid rgba(90,130,250,0.2); color: rgba(170,200,255,0.9); font-size: 10px; cursor: pointer; transition: all 0.12s; }
    .evo-result:hover { border-color: rgba(145,182,255,0.7); color: #e0f0ff; background: rgba(20,36,86,0.7); }
    #tracked-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
    .tracked-item { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(90,130,250,0.2); border-radius: 5px; background: rgba(8,18,48,0.55); padding: 6px 9px; }
    .tracked-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .tracked-name { flex: 1; font-size: 10px; color: rgba(190,215,255,0.95); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tracked-val { font-size: 10px; color: rgba(140,180,255,0.75); flex-shrink: 0; min-width: 36px; text-align: right; }
    .tracked-rm { background: none; border: none; color: rgba(180,80,80,0.65); cursor: pointer; font-size: 14px; padding: 0 3px; line-height: 1; }
    .tracked-rm:hover { color: rgba(255,110,110,0.9); }
    #evo-empty { color: rgba(104,130,182,0.7); font-size: 10px; padding: 4px 2px; text-align: center; line-height: 1.5; }
    #evo-tooltip { position: fixed; pointer-events: none; display: none; z-index: 30; background: rgba(2,4,20,0.96); border: 1px solid rgba(80,120,255,0.35); border-radius: 4px; padding: 8px 12px; font-size: 11px; line-height: 1.6; }
    #evo-tooltip-period { color: #d0e8ff; font-size: 11px; margin-bottom: 4px; }
    .evo-tt-row { display: flex; align-items: center; gap: 6px; }
    .evo-tt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .evo-tt-name { color: rgba(175,205,255,0.9); flex: 1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
    .evo-tt-val { color: rgba(160,200,255,0.8); font-size: 10px; }
    /* ── Sélecteur de fenêtre temporelle ────────────────────────────────────── */
    #window-row { display: none; justify-content: center; gap: 4px; margin-bottom: 8px; }
    #window-row.visible { display: flex; }
    .win-btn {
      background: rgba(8,16,44,0.55); border: 1px solid rgba(90,130,250,0.22); border-radius: 3px;
      color: rgba(110,150,210,0.65); font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 1px; padding: 3px 9px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
    }
    .win-btn:hover { border-color: rgba(120,170,255,0.55); color: rgba(180,210,255,0.9); }
    .win-btn.active { border-color: rgba(120,180,255,0.75); background: rgba(30,60,150,0.40); color: #d0e8ff; box-shadow: 0 0 8px rgba(80,130,255,0.2); }
    #window-granularity { text-align: center; font-size: 9px; letter-spacing: 0.8px; color: rgba(90,130,180,0.50); margin-bottom: 4px; display: none; }
    #window-granularity.visible { display: block; }

<script>
(async () => {
  try {
  // ── Données ───────────────────────────────────────────────────────────────
  let graphData, tsData;
  try {
    const [gRes, tRes] = await Promise.all([fetch('./graph.json'), fetch('./timeseries.json')]);
    if (!gRes.ok) throw new Error('graph.json: ' + gRes.statusText);
    if (!tRes.ok) throw new Error('timeseries.json: ' + tRes.statusText);
    [graphData, tsData] = await Promise.all([gRes.json(), tRes.json()]);
  } catch(e) {
    const loading = document.getElementById('loading-text');
    if (window.location.protocol === 'file:') {
      loading.textContent = 'ouvrir via http://localhost (pas file://) — ex: ./run_chrome.sh';
    } else {
      loading.textContent = 'fichiers introuvables — lancer build_data.R (' + e.message + ')';
    }
    return;
  }
  // Mode "Classement évolutif" utilise graphData, mode "Suivi personnalisé" utilise tsData.
  // On swap les globals à chaque changement de mode (voir setMode).
  let graphs  = graphData.graphs;
  let periods = graphData.meta.periods;
  const countries   = graphData.meta.countries;
  const allMediaIds = Array.isArray(graphData.meta.media_ids) ? graphData.meta.media_ids : [];
  let graphIdx = graphData.meta.periods.length - 1;
  let tsIdx    = tsData.meta.periods.length - 1;
  let mediaPanelCollapsed = false;

  const MAX_LINKS_NODE = 5;

  // ── Couleurs ──────────────────────────────────────────────────────────────
  // ── Anti-hairball ─────────────────────────────────────────────────────────
  function filterTopLinks(links, max) {
    const m = new Map();
    links.forEach(l => {
      [l.source, l.target].forEach(k => { if (!m.has(k)) m.set(k,[]); m.get(k).push(l); });
    });
    const kept = new Set();
    m.forEach(ls => { ls.sort((a,b)=>b.value-a.value); ls.slice(0,max).forEach(l=>kept.add(l)); });
    return [...kept];
  }

  function normalizeMediaIds(mediaIds) {
    return Array.isArray(mediaIds) ? mediaIds.filter(Boolean) : (mediaIds ? [mediaIds] : []);
  }

  function collectCountryMediaIds(country) {
    const mediaSet = new Set();
    const countryGraphs = graphs[country] || {};
    Object.values(countryGraphs).forEach(g => {
      (g.nodes || []).forEach(n => normalizeMediaIds(n.media_ids).forEach(m => mediaSet.add(m)));
      (g.links || []).forEach(l => normalizeMediaIds(l.media_ids).forEach(m => mediaSet.add(m)));
    });
    return [...mediaSet].sort();
  }

  const mediaIdsByCountry = Object.fromEntries(
    countries.map(country => [country, collectCountryMediaIds(country)])
  );

  const selectedMediaByCountry = Object.fromEntries(
    countries.map(country => [country, new Set(mediaIdsByCountry[country])])
  );

  function getAvailableMediaIds(country = currentCountry) {
    return mediaIdsByCountry[country] || [];
  }

  function getSelectedMedia(country = currentCountry) {
    if (!selectedMediaByCountry[country]) {
      selectedMediaByCountry[country] = new Set(getAvailableMediaIds(country));
    }
    return selectedMediaByCountry[country];
  }

  function hasMediaIntersection(mediaIds) {
    const ids = normalizeMediaIds(mediaIds);
    const selectedMedia = getSelectedMedia();
    if (!ids.length) return false;
    if (!selectedMedia.size) return false;
    for (const m of ids) {
      if (selectedMedia.has(m)) return true;
    }
    return false;
  }

  function getGD(country, key) {
    const g = graphs[country]?.[key];
    if (!g) return { nodes:[], links:[] };
    let nodes = g.nodes.map(n=>({...n}));
    let links = g.links.map(l=>({...l}));

    const selectedMedia = getSelectedMedia(country);
    const availableMediaIds = getAvailableMediaIds(country);
    const filterActive = selectedMedia.size > 0 && selectedMedia.size < availableMediaIds.length;
    if (filterActive) {
      nodes = nodes.filter(n => hasMediaIntersection(n.media_ids));
      const nodeSet = new Set(nodes.map(n => n.id));
      links = links.filter(l => {
        const s = l.source?.id ?? l.source;
        const t = l.target?.id ?? l.target;
        return nodeSet.has(s) && nodeSet.has(t) && hasMediaIntersection(l.media_ids);
      });
    }

    nodes.sort((a,b)=>b.size-a.size);
    nodes.forEach((n,i)=>{ n._rank=i; });
    return { nodes, links: filterTopLinks(links, MAX_LINKS_NODE) };
  }

  function renderMediaFilters() {
    const list = document.getElementById('media-list');
    const availableMediaIds = getAvailableMediaIds();
    const selectedMedia = getSelectedMedia();

    if (!availableMediaIds.length) {
      list.innerHTML = '<div id="media-empty">Aucun média disponible.</div>';
      return;
    }

    list.innerHTML = '';
    availableMediaIds.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'media-item';
      btn.dataset.mediaId = m;
      btn.textContent = m;
      if (selectedMedia.has(m)) btn.classList.add('active');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectedMedia.has(m)) selectedMedia.delete(m);
        else selectedMedia.add(m);
        syncMediaButtons();
        loadPeriod(currentCountry, currentIdx);
      });
      list.appendChild(btn);
    });

    syncMediaButtons();
  }

  function syncMediaButtons() {
    const selectedMedia = getSelectedMedia();
    document.querySelectorAll('.media-item').forEach(btn => {
      if (selectedMedia.has(btn.dataset.mediaId)) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function setMediaPanelCollapsed(collapsed) {
    mediaPanelCollapsed = Boolean(collapsed);
    const panel = document.getElementById('media-panel');
    const toggle = document.getElementById('media-toggle');
    panel.classList.toggle('collapsed', mediaPanelCollapsed);
    toggle.textContent = mediaPanelCollapsed ? 'Ouvrir' : 'Masquer';
    toggle.setAttribute('aria-expanded', String(!mediaPanelCollapsed));
  }

  function periodConvergenceScore(country, key) {
    const g = graphs[country]?.[key];
    if (!g || !Array.isArray(g.nodes) || !g.nodes.length) return 0;

    const sizes = g.nodes.map(n => Number(n.size) || 0).sort((a, b) => b - a);
    const ultra = sizes.slice(0, 3).reduce((a, b) => a + b, 0);
    const linksStrong = (g.links || []).reduce((acc, l) => acc + Math.max(0, (Number(l.value) || 0) - 1), 0);
    const density = linksStrong / Math.max(1, g.nodes.length);

    // Score synthétique: salience ultra + convergence de cooccurrence.
    return ultra * 0.75 + linksStrong * 0.95 + density * 1.6;
  }

  function heatColor(t) {
    const tt = Math.max(0, Math.min(1, t));
    const r = Math.round(30 + tt * 130);
    const g = Math.round(50 + tt * 165);
    const b = Math.round(115 + tt * 125);
    const a = (0.30 + tt * 0.70).toFixed(2);
    return `rgba(${r},${g},${b},${a})`;
  }

  function applyTimelineHeat(country) {
    if (!periods.length) return;
    const scores = periods.map(p => periodConvergenceScore(country, p.key));
    const min = Math.min(...scores);
    const max = Math.max(...scores);
    const denom = Math.max(1e-9, max - min);
    const norm = scores.map(s => (s - min) / denom);

    if (periods.length === 1) {
      slider.style.background = `linear-gradient(to right, ${heatColor(norm[0])}, ${heatColor(norm[0])})`;
      slider.dataset.convScores = JSON.stringify(scores);
      return;
    }

    const stops = [];
    for (let i = 0; i < norm.length; i++) {
      const start = i === 0 ? 0 : ((i - 0.5) / (norm.length - 1)) * 100;
      const end = i === norm.length - 1 ? 100 : ((i + 0.5) / (norm.length - 1)) * 100;
      const c = heatColor(norm[i]);
      stops.push(`${c} ${start.toFixed(2)}%`, `${c} ${end.toFixed(2)}%`);
    }
    slider.style.background = `linear-gradient(to right, ${stops.join(',')})`;
    slider.dataset.convScores = JSON.stringify(scores);
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>'"]/g, c => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[c]));
  }

  function renderArticlesPanel(node) {
    const panel = document.getElementById('object-panel');
    if (!node) {
      panel.classList.remove('visible');
      panel.innerHTML = '';
      return;
    }

    const articles = Array.isArray(node.articles) ? node.articles : [];
    const items = articles.map(a => {
      const title = escapeHtml(a.title || a.url || 'Article');
      const url = escapeHtml(a.url || '#');
      const media = a.media_id ? `<span class="it-media">${escapeHtml(a.media_id)}</span>` : '';
      return `<a class="it" href="${url}" target="_blank" rel="noopener noreferrer">${media}${title}</a>`;
    }).join('');
    const constellationUrl = `./constellation.html?country=${encodeURIComponent(currentCountry)}&node=${encodeURIComponent(node.id)}`;

    const isTracked = trackedObjects.has(node.id);
    panel.innerHTML = `
      <div class="h">${escapeHtml(node.id)}</div>
      <div class="meta">${node.size.toFixed(2)} pts · ${node.n} mentions · ${articles.length} articles</div>
      <div class="panel-actions">
        <a class="panel-link" href="${constellationUrl}">Voir dans Constellation</a>
      </div>
      <button class="track-btn${isTracked ? ' tracked' : ''}" id="track-btn-panel">${isTracked ? '✓ Suivi' : '+ Suivre'}</button>
      <div class="list">${items || '<div class="empty">Aucun article associé dans ce jeu de données.</div>'}</div>
    `;
    panel.classList.add('visible');
    document.getElementById('track-btn-panel').addEventListener('click', () => {
      const btn = document.getElementById('track-btn-panel');
      if (trackedObjects.has(node.id)) { removeTracked(node.id); btn.textContent = '+ Suivre'; btn.classList.remove('tracked'); }
      else { addTracked(node.id); btn.textContent = '✓ Suivi'; btn.classList.add('tracked'); }
    });
  }

  // ── Étoiles ───────────────────────────────────────────────────────────────
  const STARS = Array.from({length: 400}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.15,
    a: Math.random() * 0.45 + 0.08,
    tw: Math.random() * Math.PI * 2,
    ts: 0.003 + Math.random() * 0.007
  }));

  window.addEventListener('resize', () => {
    if (currentMode === 'tracking') renderEvolutionChart();
    else {
      const period = periods[currentIdx];
      if (period) renderRankedChart(getGD(currentCountry, period.key));
    }
  });

  // ── État ──────────────────────────────────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const urlCountry = (urlParams.get('country') || '').toUpperCase();
  let currentCountry = countries.includes(urlCountry) ? urlCountry : countries[0];
  let currentIdx     = periods.length - 1;
  let focusedNode    = null;
  let playInterval   = null;
  let playSpeed      = 1500;
  const SPEEDS       = [1500, 700, 250];
  const SPEED_LABELS = ['1×', '2×', '5×'];
  let speedIdx       = 0;

  // ── Suivi Temporel ────────────────────────────────────────────────────────
  const TRACK_COLORS = ['#ff6b6b','#ffd93d','#48dbfb','#ff9ff3','#54a0ff','#00d2d3','#ff9f43','#10ac84','#c7b9ff','#f368e0'];
  let trackedObjects = new Set();
  const trackColorMap = new Map();
  let trackColorSeq = 0;
  let currentMode = 'ranked';
  let evoMaxVal = 1;
  let rankedHoverIdx = null;
  let hoveredNode = null;
  let rankedShowMore = false;
  let rankedWindow = 'all';

  const RANKED_WINDOWS = {
    '24h': { hours:  24, topN: 12 },
    '72h': { hours:  72, topN: 10 },
    '7j':  { hours: 168, topN: 10 },
    '30j': { hours: 720, topN:  8 },
    'all': { hours: Infinity, topN: 10 },
  };

  function parsePeriodKey(key) {
    // '2026-04-21_00-04' → Date du début du bloc
    const [date, time] = key.split('_');
    const h = (time || '00').split('-')[0].padStart(2, '0');
    return new Date(`${date}T${h}:00:00`);
  }

  function getRankedWindowPeriods() {
    const cfg = RANKED_WINDOWS[rankedWindow] || RANKED_WINDOWS['all'];
    if (!isFinite(cfg.hours) || !periods.length) return periods;
    const last = parsePeriodKey(periods[periods.length - 1].key);
    const cutoff = new Date(last.getTime() - cfg.hours * 3600 * 1000);
    const filtered = periods.filter(p => parsePeriodKey(p.key) >= cutoff);
    return filtered.length > 0 ? filtered : periods;
  }

  function getRankedTopN() {
    return (RANKED_WINDOWS[rankedWindow] || RANKED_WINDOWS['all']).topN;
  }

  function updateWindowUI() {
    const winRow  = document.getElementById('window-row');
    const granEl  = document.getElementById('window-granularity');
    const visible = currentMode === 'ranked';
    if (winRow)  winRow.classList.toggle('visible', visible);
    if (granEl)  granEl.classList.toggle('visible', visible);
    if (!visible) return;
    document.querySelectorAll('.win-btn').forEach(b => b.classList.toggle('active', b.dataset.win === rankedWindow));
    if (granEl) {
      const wp = getRankedWindowPeriods();
      const cfg = RANKED_WINDOWS[rankedWindow] || RANKED_WINDOWS['all'];
      const label = rankedWindow === 'all' ? `${wp.length} périodes · cadence 4h` : `${wp.length} périodes · fenêtre ${rankedWindow} · cadence 4h`;
      granEl.textContent = label;
    }
  }

  function clearFocusAndRecenter() {
    focusedNode = null;
    renderArticlesPanel(null);
    setTop10Active(null);
  }

  function loadPeriod(country, idx) {
    const period = periods[idx]; if (!period) return;
    const gd = getGD(country, period.key);
    focusedNode = null;
    const conv = periodConvergenceScore(country, period.key);
    document.getElementById('period-label').innerHTML =
      `<span>${period.label}</span> &nbsp;·&nbsp; ${gd.nodes.length} objets &nbsp;·&nbsp; ${gd.links.length} liens &nbsp;·&nbsp; convergence ${conv.toFixed(1)}`;
    renderTop10(gd, country);
    renderArticlesPanel(null);
    if (currentMode === 'tracking') { renderTrackedList(); renderEvolutionChart(); }
    else { renderRankedChart(gd, rankedHoverIdx); }
  }

  function renderTop10(gd, country) {
    const list = document.getElementById('top10-list');
    const countryEl = document.getElementById('top10-country');
    if (countryEl) countryEl.textContent = country;
    if (!list) return; // mode ranked: la légende dynamique gère l'affichage

    const top = (gd.nodes || []).slice().sort((a, b) => b.size - a.size).slice(0, 10);
    if (!top.length) {
      list.innerHTML = '<div id="top10-empty">Aucun objet pour cette période.</div>';
      return;
    }

    list.innerHTML = '';
    top.forEach((n, i) => {
      const btn = document.createElement('button');
      btn.className = 'top10-item';
      btn.dataset.nodeId = n.id;
      btn.innerHTML = `<span class="top10-rank">${i + 1}.</span>${escapeHtml(n.id)}<span class="top10-score">${n.size.toFixed(1)} pts · ${n.n} mentions</span>`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        focusNodeById(btn.dataset.nodeId);
      });
      list.appendChild(btn);
    });
  }

  function setTop10Active(nodeId) {
    document.querySelectorAll('.top10-item').forEach(btn => {
      if (nodeId && btn.dataset.nodeId === nodeId) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function focusNodeById(nodeId) {
    const period = periods[currentIdx];
    const gd = getGD(currentCountry, period?.key);
    const node = (gd.nodes || []).find(n => n.id === nodeId);
    if (!node) return;

    focusedNode = node.id;
    document.getElementById('tooltip').style.display = 'none';
    renderArticlesPanel(node);
    setTop10Active(node.id);
  }

  document.addEventListener('mousemove', e => {
    const tt = document.getElementById('tooltip');
    if (tt.style.display === 'block') {
      tt.style.left = Math.min(e.clientX+16, window.innerWidth-240)+'px';
      tt.style.top  = Math.min(e.clientY-10, window.innerHeight-120)+'px';
    }
  });

  // ── Fonctions mode Évolution ──────────────────────────────────────────────
  function getTrackColor(id) {
    if (!trackColorMap.has(id)) { trackColorMap.set(id, TRACK_COLORS[trackColorSeq % TRACK_COLORS.length]); trackColorSeq++; }
    return trackColorMap.get(id);
  }

  function addTracked(id) {
    if (!id || trackedObjects.has(id)) return;
    trackedObjects.add(id); getTrackColor(id);
    renderTrackedList();
    if (currentMode === 'tracking') renderEvolutionChart();
  }

  function removeTracked(id) {
    trackedObjects.delete(id); renderTrackedList();
    if (currentMode === 'tracking') renderEvolutionChart();
  }

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function getAllObjectIds() {
    const ids = new Set();
    Object.values(graphs[currentCountry] || {}).forEach(g => { (g.nodes || []).forEach(n => ids.add(n.id)); });
    return [...ids].sort();
  }

  function renderTrackedList() {
    const list = document.getElementById('tracked-list');
    if (!list) return;
    list.innerHTML = '';
    if (!trackedObjects.size) {
      list.innerHTML = '<div id="evo-empty">Recherchez un objet ci-dessus<br>ou cliquez sur "Suivre" dans le classement.</div>';
      return;
    }
    const period = periods[currentIdx];
    const g = graphs[currentCountry]?.[period?.key];
    trackedObjects.forEach(id => {
      const color = getTrackColor(id);
      const node = g?.nodes.find(n => n.id === id);
      const val = node ? node.size.toFixed(1) : '—';
      const item = document.createElement('div');
      item.className = 'tracked-item';
      item.innerHTML = `
        <div class="tracked-swatch" style="background:${color};box-shadow:0 0 5px ${color}aa"></div>
        <div class="tracked-name" title="${escapeHtml(id)}">${escapeHtml(id)}</div>
        <div class="tracked-val">${val}</div>
        <button class="tracked-rm" title="Retirer">×</button>
      `;
      item.querySelector('.tracked-rm').addEventListener('click', e => { e.stopPropagation(); removeTracked(id); });
      list.appendChild(item);
    });
  }

  function renderEvoSearchResults(q) {
    const resultsEl = document.getElementById('evo-search-results');
    if (!resultsEl) return;
    resultsEl.innerHTML = '';
    if (!q.trim()) return;
    const ql = q.toLowerCase();
    const matches = getAllObjectIds().filter(id => id.toLowerCase().includes(ql) && !trackedObjects.has(id)).slice(0, 7);
    matches.forEach(id => {
      const div = document.createElement('div');
      div.className = 'evo-result';
      div.textContent = id;
      div.addEventListener('click', () => {
        addTracked(id);
        document.getElementById('evo-search').value = '';
        renderEvoSearchResults('');
      });
      resultsEl.appendChild(div);
    });
  }

  function renderRankedLegend(series, hoverIdx) {
    const list = document.getElementById('ranked-legend-list');
    const periodEl = document.getElementById('ranked-legend-period');
    if (!list) return;

    const winPeriods = getRankedWindowPeriods();
    const limit = rankedShowMore ? 20 : getRankedTopN();
    const idx = (hoverIdx !== null && hoverIdx >= 0) ? hoverIdx : winPeriods.findIndex(p => p.key === periods[currentIdx]?.key);
    const safeIdx = idx >= 0 ? idx : winPeriods.length - 1;
    const period = winPeriods[safeIdx];
    if (periodEl) periodEl.textContent = period?.label || '';

    // Trier par valeur au point courant, ou par score max si null
    const rows = series
      .slice(0, limit)
      .map(s => {
        const val = s.data[safeIdx] ?? null;
        const prev = safeIdx > 0 ? s.data[safeIdx - 1] ?? null : null;
        const delta = (val !== null && prev !== null) ? val - prev : null;
        return { id: s.id, color: s.color, val, delta, maxVal: s.maxVal ?? 0 };
      })
      .sort((a, b) => {
        if (b.val !== null && a.val !== null) return b.val - a.val;
        if (b.val !== null) return 1;
        if (a.val !== null) return -1;
        return b.maxVal - a.maxVal;
      });

    const hasHover = hoveredNode !== null || focusedNode !== null;
    list.innerHTML = '';
    rows.forEach((r, i) => {
      const isFocused  = focusedNode  === r.id;
      const isHovered  = hoveredNode  === r.id;
      const isDimmed   = hasHover && !isFocused && !isHovered;

      let deltaTxt = '', deltaClass = 'flat';
      if (r.delta !== null && Math.abs(r.delta) >= 0.01) {
        deltaClass = r.delta > 0 ? 'up' : 'down';
        deltaTxt = `${r.delta > 0 ? '▲' : '▼'} ${Math.abs(r.delta).toFixed(1)}`;
      } else if (r.delta !== null) {
        deltaTxt = '=';
      }

      const item = document.createElement('div');
      item.className = 'rleg-item' +
        (isFocused ? ' focused' : '') +
        (isHovered && !isFocused ? ' hovered' : '') +
        (isDimmed ? ' dimmed' : '');
      item.dataset.nodeId = r.id;
      item.innerHTML = `
        <div class="rleg-swatch" style="background:${r.color};box-shadow:0 0 5px ${r.color}88"></div>
        <span class="rleg-rank">${i + 1}.</span>
        <span class="rleg-name" title="${escapeHtml(r.id)}">${escapeHtml(r.id)}</span>
        <span class="rleg-val${r.val === null ? ' null-val' : ''}">${r.val !== null ? r.val.toFixed(1) : '—'}</span>
        <span class="rleg-delta ${deltaClass}">${deltaTxt}</span>
      `;

      item.addEventListener('mouseenter', () => {
        hoveredNode = r.id;
        renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), rankedHoverIdx);
        renderRankedLegend(series, rankedHoverIdx);
      });
      item.addEventListener('mouseleave', () => {
        hoveredNode = null;
        renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), rankedHoverIdx);
        renderRankedLegend(series, rankedHoverIdx);
      });
      item.addEventListener('click', e => {
        e.stopPropagation();
        const gd = getGD(currentCountry, periods[currentIdx]?.key);
        const node = (gd.nodes || []).find(nd => nd.id === r.id);
        focusedNode = isFocused ? null : r.id;
        setTop10Active(focusedNode);
        if (focusedNode && node) renderArticlesPanel(node);
        else renderArticlesPanel(null);
        renderRankedChart(gd, rankedHoverIdx);
        renderRankedLegend(series, rankedHoverIdx);
      });

      list.appendChild(item);
    });

    // Bouton + Voir plus / moins
    const moreBtn = document.getElementById('ranked-legend-more');
    if (moreBtn) {
      moreBtn.textContent = rankedShowMore ? '− Voir moins' : '+ Voir plus';
      moreBtn.style.display = series.length > 10 ? '' : 'none';
    }
  }

  function getRankedSeries(gd, limit = 10, winPeriods = null) {
    const wp = winPeriods || getRankedWindowPeriods();
    // Score = saillance max de l'objet sur toute la fenêtre, en respectant les filtres médias
    const scoreMap = new Map();
    for (const p of wp) {
      const g = getGD(currentCountry, p.key);
      for (const nd of g.nodes) {
        scoreMap.set(nd.id, Math.max(scoreMap.get(nd.id) ?? 0, nd.size));
      }
    }
    const topIds = [...scoreMap.entries()]
      .sort((a, b) => b[1] - a[1])
      .slice(0, limit)
      .map(e => e[0]);
    return topIds.map((id, i) => ({
      id,
      color: TRACK_COLORS[i % TRACK_COLORS.length],
      maxVal: scoreMap.get(id) ?? 0,
      data: wp.map(p => {
        const g = getGD(currentCountry, p.key);
        return g.nodes.find(nd => nd.id === id)?.size ?? null;
      })
    }));
  }

  function getRankedChartLayout(rect) {
    const W = rect.width;
    const mediaVisible = document.getElementById('media-panel').style.display !== 'none';
    const topVisible = document.getElementById('top10-panel').style.display !== 'none';
    const compact = W < 960;
    const leftPad = mediaVisible ? (compact ? 58 : Math.min(290, W * 0.30) + 26) : 72;
    const rightPad = topVisible ? (compact ? 24 : Math.min(360, W * 0.35) + 28) : 24;
    let bottomPad = 72;
    const controls = document.getElementById('controls');
    if (controls) {
      const controlsRect = controls.getBoundingClientRect();
      const controlsTop = controlsRect.top - rect.top;
      if (Number.isFinite(controlsTop)) bottomPad = Math.max(bottomPad, rect.height - controlsTop + 12);
    }
    const PAD = { top: compact ? 112 : 94, right: rightPad, bottom: bottomPad, left: leftPad };
    const chartW = Math.max(90, rect.width - PAD.left - PAD.right);
    const chartH = Math.max(80, rect.height - PAD.top - PAD.bottom);
    return { PAD, chartW, chartH };
  }

  function renderRankedChart(gd, hoverIdx = null) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width;
    const H = canvas.height;
    if (!W || !H) return;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#00000f';
    ctx.fillRect(0, 0, W, H);

    STARS.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,205,255,${(s.a * 0.35).toFixed(2)})`;
      ctx.fill();
    });

    const winPeriods = getRankedWindowPeriods();
    const series = getRankedSeries(gd, getRankedTopN(), winPeriods);
    if (!series.length) return;
    const n = winPeriods.length;
    if (!n) return;

    const { PAD, chartW, chartH } = getRankedChartLayout(rect);
    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const allVals = series.flatMap(s => s.data.filter(v => v !== null));
    const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
    const yOf = v => PAD.top + chartH - (v / maxVal) * chartH;

    // Grid horizontal
    ctx.font = '9px "Space Mono", monospace';
    for (let gi = 0; gi <= 5; gi++) {
      const v = (gi / 5) * maxVal;
      const y = yOf(v);
      ctx.strokeStyle = 'rgba(55,85,175,0.18)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 6]);
      ctx.beginPath();
      ctx.moveTo(PAD.left, y);
      ctx.lineTo(PAD.left + chartW, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(110,150,215,0.55)';
      ctx.textAlign = 'right';
      ctx.fillText(v >= 100 ? v.toFixed(0) : v.toFixed(1), PAD.left - 8, y + 3);
    }

    // Axes + X ticks
    const xStep = Math.max(1, Math.floor(n / 10));
    winPeriods.forEach((p, i) => {
      if (i % xStep !== 0 && i !== n - 1) return;
      const x = xOf(i);
      ctx.strokeStyle = 'rgba(55,85,175,0.22)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, PAD.top + chartH);
      ctx.lineTo(x, PAD.top + chartH + 5);
      ctx.stroke();
      ctx.fillStyle = 'rgba(100,140,205,0.5)';
      ctx.textAlign = 'center';
      const date = p.label.length > 10 ? p.label.slice(0, 10) : p.label;
      const rest = p.label.slice(10).trim();
      ctx.fillText(date, x, H - PAD.bottom + 22);
      if (rest) {
        ctx.fillStyle = 'rgba(80,120,180,0.38)';
        ctx.fillText(rest, x, H - PAD.bottom + 34);
      }
    });

    ctx.strokeStyle = 'rgba(75,115,195,0.22)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PAD.left, PAD.top);
    ctx.lineTo(PAD.left, PAD.top + chartH);
    ctx.lineTo(PAD.left + chartW, PAD.top + chartH);
    ctx.stroke();

    // Index de la période courante dans winPeriods (avant le tracé des dots)
    const winCurrentIdx = winPeriods.findIndex(p => p.key === periods[currentIdx]?.key);

    // Lignes des objets Top 10
    const hasActiveNode = focusedNode !== null || hoveredNode !== null;
    series.forEach(s => {
      const [r, g, b] = hexToRgb(s.color);
      const isFocused  = focusedNode  === s.id;
      const isHovered  = hoveredNode  === s.id;
      const isActive   = isFocused || isHovered;
      const isDimmed   = hasActiveNode && !isActive;
      const lineAlpha  = isDimmed ? 0.18 : 1;

      ctx.beginPath();
      let first = true;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i);
        const y = yOf(v);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = isDimmed
        ? `rgba(${r},${g},${b},0.18)`
        : s.color;
      ctx.lineWidth  = isActive ? 3.2 : 2;
      ctx.shadowColor = s.color;
      ctx.shadowBlur  = isActive ? 14 : (isDimmed ? 0 : 7);
      ctx.stroke();
      ctx.shadowBlur = 0;

      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i);
        const y = yOf(v);
        const isCurrent = i === winCurrentIdx;
        const radius = isCurrent ? (isActive ? 5 : 4) : 2.2;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = isDimmed
          ? `rgba(${r},${g},${b},0.18)`
          : (isCurrent ? `rgba(${r},${g},${b},0.98)` : `rgba(${r},${g},${b},0.76)`);
        ctx.fill();
      });
    });

    // Appel légende dynamique (sans boucle infinie)
    requestAnimationFrame(() => renderRankedLegend(series, hoverIdx));

    // Marqueur de période courante
    if (winCurrentIdx >= 0) {
      const cx = xOf(winCurrentIdx);
      ctx.strokeStyle = 'rgba(180,210,255,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.beginPath();
      ctx.moveTo(cx, PAD.top - 8);
      ctx.lineTo(cx, PAD.top + chartH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(180,210,255,0.5)';
      ctx.font = '9px "Space Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▼', cx, PAD.top - 10);
    }

    // Marqueur de hover
    if (hoverIdx !== null && hoverIdx >= 0 && hoverIdx < n) {
      const hx = xOf(hoverIdx);
      ctx.strokeStyle = 'rgba(200,220,255,0.18)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.moveTo(hx, PAD.top);
      ctx.lineTo(hx, PAD.top + chartH);
      ctx.stroke();
      ctx.setLineDash([]);
      series.forEach(s => {
        const v = s.data[hoverIdx];
        if (v === null) return;
        ctx.beginPath();
        ctx.arc(hx, yOf(v), focusedNode === s.id ? 6.2 : 5, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }
  }

  function rankedChartHoverAt(clientX, clientY) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas || currentMode !== 'ranked') return;
    const rect = canvas.getBoundingClientRect();
    const { PAD, chartW } = getRankedChartLayout(rect);
    const winPeriods = getRankedWindowPeriods();
    const n = winPeriods.length;
    const canvasX = clientX - rect.left;

    if (canvasX < PAD.left || canvasX > PAD.left + chartW) {
      rankedHoverIdx = null;
      renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), null);
      return;
    }

    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));
    rankedHoverIdx = idx;
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    renderRankedChart(gd, idx);
    // La légende est mise à jour par renderRankedChart via requestAnimationFrame.
  }

  function getEvolutionChartLayout(rect) {
    const panelW = Math.min(310, rect.width * 0.30) + 30;
    let bottomPad = 72;
    const controls = document.getElementById('controls');
    if (controls) {
      const controlsRect = controls.getBoundingClientRect();
      const controlsTop = controlsRect.top - rect.top;
      if (Number.isFinite(controlsTop)) {
        // Garder l'axe X et les points bas au-dessus de la zone des contrôles.
        bottomPad = Math.max(bottomPad, rect.height - controlsTop + 12);
      }
    }
    const PAD = { top: 88, right: panelW, bottom: bottomPad, left: 72 };
    const chartW = Math.max(100, rect.width - PAD.left - PAD.right);
    const chartH = Math.max(80, rect.height - PAD.top - PAD.bottom);
    return { PAD, panelW, chartW, chartH };
  }

  function renderEvolutionChart(hoverIdx = null) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas || currentMode !== 'tracking') return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#00000f'; ctx.fillRect(0, 0, W, H);
    STARS.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,205,255,${(s.a * 0.35).toFixed(2)})`; ctx.fill();
    });

    const { PAD, chartW, chartH } = getEvolutionChartLayout(rect);
    const n = periods.length;

    if (!trackedObjects.size) {
      ctx.fillStyle = 'rgba(120,160,220,0.35)'; ctx.font = '13px "Space Mono", monospace'; ctx.textAlign = 'center';
      ctx.fillText('Ajoutez des objets pour visualiser leur évolution', PAD.left + chartW / 2, H / 2);
      ctx.fillStyle = 'rgba(80,110,160,0.4)'; ctx.font = '10px "Space Mono", monospace';
      ctx.fillText('Recherchez à droite, ou cliquez "Suivre" sur un objet', PAD.left + chartW / 2, H / 2 + 26);
      return;
    }

    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const yOf = (v, mx) => PAD.top + chartH - (v / mx) * chartH;

    const series = [...trackedObjects].map(id => ({
      id, color: getTrackColor(id),
      data: periods.map(p => { const g = graphs[currentCountry]?.[p.key]; return g?.nodes.find(nd => nd.id === id)?.size ?? null; })
    }));
    const allVals = series.flatMap(s => s.data.filter(v => v !== null));
    const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
    evoMaxVal = maxVal;

    // Grid
    ctx.font = '9px "Space Mono", monospace';
    for (let gi = 0; gi <= 5; gi++) {
      const v = (gi / 5) * maxVal, y = yOf(v, maxVal);
      ctx.strokeStyle = 'rgba(55,85,175,0.18)'; ctx.lineWidth = 1; ctx.setLineDash([3, 6]);
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(110,150,215,0.55)'; ctx.textAlign = 'right';
      ctx.fillText(v >= 100 ? v.toFixed(0) : v.toFixed(1), PAD.left - 8, y + 3);
    }

    // X ticks
    const xStep = Math.max(1, Math.floor(n / 10));
    periods.forEach((p, i) => {
      if (i % xStep !== 0 && i !== n - 1) return;
      const x = xOf(i);
      ctx.strokeStyle = 'rgba(55,85,175,0.22)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, PAD.top + chartH); ctx.lineTo(x, PAD.top + chartH + 5); ctx.stroke();
      ctx.fillStyle = 'rgba(100,140,205,0.5)'; ctx.textAlign = 'center';
      const date = p.label.length > 10 ? p.label.slice(0, 10) : p.label;
      const rest = p.label.slice(10).trim();
      ctx.fillText(date, x, H - PAD.bottom + 22);
      if (rest) { ctx.fillStyle = 'rgba(80,120,180,0.38)'; ctx.fillText(rest, x, H - PAD.bottom + 34); }
    });

    // Axes
    ctx.strokeStyle = 'rgba(75,115,195,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top + chartH); ctx.lineTo(PAD.left + chartW, PAD.top + chartH); ctx.stroke();

    // Series: area + line + dots
    series.forEach(s => {
      const [r2, g2, b2] = hexToRgb(s.color);
      // Area fill
      ctx.beginPath();
      let first = true, lastX = null;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i), y = yOf(v, maxVal);
        if (first) { ctx.moveTo(x, PAD.top + chartH); ctx.lineTo(x, y); first = false; } else ctx.lineTo(x, y);
        lastX = x;
      });
      if (lastX !== null) { ctx.lineTo(lastX, PAD.top + chartH); ctx.closePath(); ctx.fillStyle = `rgba(${r2},${g2},${b2},0.07)`; ctx.fill(); }
      // Line
      ctx.beginPath(); first = true;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i), y = yOf(v, maxVal);
        if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.shadowColor = s.color; ctx.shadowBlur = 7; ctx.stroke(); ctx.shadowBlur = 0;
      // Dots
      s.data.forEach((v, i) => {
        if (v === null) return;
        ctx.beginPath(); ctx.arc(xOf(i), yOf(v, maxVal), 2.5, 0, Math.PI * 2); ctx.fillStyle = s.color; ctx.fill();
      });
    });

    // Hover dots + vertical line
    if (hoverIdx !== null && hoverIdx >= 0 && hoverIdx < n) {
      ctx.strokeStyle = 'rgba(200,220,255,0.18)'; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(xOf(hoverIdx), PAD.top); ctx.lineTo(xOf(hoverIdx), PAD.top + chartH); ctx.stroke(); ctx.setLineDash([]);
      series.forEach(s => {
        const v = s.data[hoverIdx]; if (v === null) return;
        ctx.beginPath(); ctx.arc(xOf(hoverIdx), yOf(v, maxVal), 5, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.shadowColor = s.color; ctx.shadowBlur = 12; ctx.fill(); ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
      });
    }

    // Current period marker
    if (currentIdx >= 0 && currentIdx < n) {
      const cx = xOf(currentIdx);
      ctx.strokeStyle = 'rgba(180,210,255,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
      ctx.beginPath(); ctx.moveTo(cx, PAD.top - 8); ctx.lineTo(cx, PAD.top + chartH); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(180,210,255,0.5)'; ctx.font = '9px "Space Mono", monospace'; ctx.textAlign = 'center';
      ctx.fillText('▼', cx, PAD.top - 10);
    }
  }

  function evoChartHoverAt(clientX, clientY) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const { PAD, chartW } = getEvolutionChartLayout(rect);
    const n = periods.length;
    const canvasX = clientX - rect.left;
    if (canvasX < PAD.left || canvasX > PAD.left + chartW) {
      renderEvolutionChart(null);
      document.getElementById('evo-tooltip').style.display = 'none'; return;
    }
    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));
    renderEvolutionChart(idx);

    const tt = document.getElementById('evo-tooltip');
    const period = periods[idx];
    document.getElementById('evo-tooltip-period').textContent = period?.label || '';
    const series = [...trackedObjects].map(id => {
      const g = graphs[currentCountry]?.[period?.key];
      return { id, color: getTrackColor(id), val: g?.nodes.find(nd => nd.id === id)?.size ?? null };
    });
    document.getElementById('evo-tooltip-items').innerHTML = series.map(s =>
      `<div class="evo-tt-row"><div class="evo-tt-dot" style="background:${s.color}"></div><div class="evo-tt-name">${escapeHtml(s.id)}</div><div class="evo-tt-val">${s.val !== null ? s.val.toFixed(2) : '—'}</div></div>`
    ).join('');
    let tx = clientX + 16, ty = clientY - 10;
    const ttW = 220, ttH = tt.offsetHeight || 50;
    if (tx + ttW > window.innerWidth) tx = clientX - ttW - 10;
    if (ty + ttH > window.innerHeight) ty = clientY - ttH - 10;
    tt.style.left = tx + 'px'; tt.style.top = ty + 'px'; tt.style.display = 'block';
  }

  function setMode(mode) {
    // Sauvegarder l'index courant avant de changer de mode
    if (currentMode === 'ranked') graphIdx = currentIdx;
    else tsIdx = currentIdx;

    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    const modeDescs = {
      ranked:   'Top 10 · comparaison de périodes · ← → pour naviguer',
      tracking: 'Graphique multi-objets · cliquez sur les séries pour détails'
    };
    const modeDescEl = document.getElementById('mode-desc');
    if (modeDescEl) modeDescEl.textContent = modeDescs[mode] || '';

    // Swapper les données + slider selon le mode
    if (mode === 'tracking') {
      graphs  = tsData.graphs;
      periods = tsData.meta.periods;
      currentIdx = Math.min(tsIdx, periods.length - 1);
    } else {
      graphs  = graphData.graphs;
      periods = graphData.meta.periods;
      currentIdx = Math.min(graphIdx, periods.length - 1);
    }
    slider.max   = periods.length - 1;
    slider.value = currentIdx;

    const evoView = document.getElementById('evolution-view');
    const top10El = document.getElementById('top10-panel');
    const mediaEl = document.getElementById('media-panel');
    const trackedEl = document.getElementById('tracked-panel');
    if (mode === 'tracking') {
      evoView.classList.add('visible'); top10El.style.display = 'none'; mediaEl.style.display = 'none';
      trackedEl.style.display = '';
      rankedHoverIdx = null;
      document.getElementById('evo-tooltip').style.display = 'none';
      renderTrackedList(); renderEvolutionChart();
    } else {
      evoView.classList.add('visible'); top10El.style.display = ''; mediaEl.style.display = '';
      trackedEl.style.display = 'none';
      applyTimelineHeat(currentCountry);
      loadPeriod(currentCountry, currentIdx);
    }
    updateWindowUI();
  }

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => tab.addEventListener('click', () => setMode(tab.dataset.mode)));

  // Boutons fenêtre temporelle (mode ranked uniquement)
  document.querySelectorAll('.win-btn').forEach(btn => btn.addEventListener('click', () => {
    rankedWindow = btn.dataset.win;
    rankedHoverIdx = null;
    updateWindowUI();
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    renderRankedChart(gd, null);
  }));

  // Bouton + Voir plus dans la légende ranked
  document.getElementById('ranked-legend-more').addEventListener('click', () => {
    rankedShowMore = !rankedShowMore;
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    const series = getRankedSeries(gd, rankedShowMore ? 20 : getRankedTopN());
    renderRankedLegend(series, rankedHoverIdx);
  });

  // Evolution canvas events
  const evoCanvas = document.getElementById('evo-canvas');
  evoCanvas.addEventListener('mousemove', e => {
    if (currentMode === 'tracking') evoChartHoverAt(e.clientX, e.clientY);
    else rankedChartHoverAt(e.clientX, e.clientY);
  });
  evoCanvas.addEventListener('mouseleave', () => {
    if (currentMode === 'tracking') renderEvolutionChart(null);
    else {
      rankedHoverIdx = null;
      const period = periods[currentIdx];
      renderRankedChart(getGD(currentCountry, period?.key), null);
    }
    document.getElementById('evo-tooltip').style.display = 'none';
  });
  evoCanvas.addEventListener('click', e => {
    if (currentMode === 'ranked') {
      // Sélectionne l'objet le plus proche du clic à la période visée.
      const period = periods[currentIdx];
      const gd = getGD(currentCountry, period?.key);
      const series = getRankedSeries(gd, 10);
      if (!series.length) return;
      const rect = evoCanvas.getBoundingClientRect();
      const { PAD, chartW, chartH } = getRankedChartLayout(rect);
      const n = periods.length;
      const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
      const allVals = series.flatMap(s => s.data.filter(v => v !== null));
      const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
      const yOf = v => PAD.top + chartH - (v / maxVal) * chartH;
      const canvasX = e.clientX - rect.left;
      const canvasY = e.clientY - rect.top;
      if (canvasX < PAD.left || canvasX > PAD.left + chartW) return;
      const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));

      let hitId = null;
      let bestDist = Infinity;
      series.forEach(s => {
        const v = s.data[idx];
        if (v === null) return;
        const dist = Math.hypot(canvasX - xOf(idx), canvasY - yOf(v));
        if (dist < bestDist) {
          bestDist = dist;
          hitId = s.id;
        }
      });
      if (hitId && bestDist <= 18) {
        focusedNode = hitId;
        setTop10Active(hitId);
        const node = (gd.nodes || []).find(n2 => n2.id === hitId);
        if (node) renderArticlesPanel(node);
        renderRankedChart(gd, rankedHoverIdx);
      }
      return;
    }
    const rect = evoCanvas.getBoundingClientRect();
    const { PAD, chartW, chartH } = getEvolutionChartLayout(rect);
    const n = periods.length;
    const canvasX = e.clientX - rect.left;
    const canvasY = e.clientY - rect.top;
    if (canvasX < PAD.left || canvasX > PAD.left + chartW) { renderArticlesPanel(null); return; }
    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));

    // Cherche un point proche du clic (rayon 20px, on teste ±1 période)
    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const yOf = v => PAD.top + chartH - (v / Math.max(evoMaxVal, 0.1)) * chartH;
    const HIT_R = 20;
    let hitNode = null;
    outer: for (const id of trackedObjects) {
      for (let di = -1; di <= 1; di++) {
        const pi = idx + di;
        if (pi < 0 || pi >= n) continue;
        const node = graphs[currentCountry]?.[periods[pi]?.key]?.nodes.find(nd => nd.id === id);
        if (!node) continue;
        if (Math.hypot(canvasX - xOf(pi), canvasY - yOf(node.size)) < HIT_R) { hitNode = node; break outer; }
      }
    }

    currentIdx = idx;
    slider.value = currentIdx;
    loadPeriod(currentCountry, currentIdx);
    if (hitNode) renderArticlesPanel(hitNode);
  });

  // Evolution search
  document.getElementById('evo-search').addEventListener('input', e => renderEvoSearchResults(e.target.value));
  document.getElementById('evo-search').addEventListener('keydown', e => { if (e.key === 'Escape') { e.target.value = ''; renderEvoSearchResults(''); } e.stopPropagation(); });
  document.getElementById('tracked-clear').addEventListener('click', () => {
    trackedObjects.clear(); trackColorMap.clear(); trackColorSeq = 0;
    renderTrackedList(); if (currentMode === 'tracking') renderEvolutionChart();
  });

  const slider = document.getElementById('timeline');
  slider.max = periods.length-1; slider.value = currentIdx;
  slider.addEventListener('input', () => { currentIdx=+slider.value; loadPeriod(currentCountry,currentIdx); });

  const playBtn = document.getElementById('play-btn');
  function advance() { currentIdx=(currentIdx+1)%periods.length; slider.value=currentIdx; loadPeriod(currentCountry,currentIdx); }
  function togglePlay() {
    if (playInterval) { clearInterval(playInterval); playInterval=null; playBtn.textContent='▶'; playBtn.classList.remove('playing'); }
    else { playBtn.textContent='⏸'; playBtn.classList.add('playing'); playInterval=setInterval(advance,playSpeed); }
  }
  playBtn.addEventListener('click', togglePlay);
  document.getElementById('speed-btn').addEventListener('click', () => {
    speedIdx=(speedIdx+1)%SPEEDS.length; playSpeed=SPEEDS[speedIdx];
    document.getElementById('speed-btn').textContent=SPEED_LABELS[speedIdx];
    if (playInterval) { clearInterval(playInterval); playInterval=setInterval(advance,playSpeed); }
  });
  // ── Recherche ─────────────────────────────────────────────────────────────
  const searchInput  = document.getElementById('search-input');
  const searchStatus = document.getElementById('search-status');

  function handleSearch(raw) {
    const q = raw.trim().toLowerCase();
    searchStatus.textContent = '';
    searchStatus.className   = '';
    if (!q) { clearFocusAndRecenter(); return; }

    // Cherche dans la période courante
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    const matchNow = (gd.nodes || []).find(n => n.id.toLowerCase().includes(q));
    if (matchNow) {
      focusNodeById(matchNow.id);
      searchStatus.textContent = matchNow.id;
      searchStatus.className   = 'found';
      return;
    }

    // Cherche dans toutes les périodes (plus récente en premier)
    let foundIdx = -1, foundId = null;
    for (let i = periods.length - 1; i >= 0; i--) {
      const g = graphs[currentCountry]?.[periods[i].key];
      if (!g) continue;
      const m = (g.nodes || []).find(n => n.id.toLowerCase().includes(q));
      if (m) { foundIdx = i; foundId = m.id; break; }
    }

    if (foundIdx !== -1) {
      currentIdx = foundIdx;
      slider.value = currentIdx;
      loadPeriod(currentCountry, currentIdx);
      focusNodeById(foundId);
      searchStatus.textContent = '↳ ' + periods[foundIdx].label;
      searchStatus.className   = 'jumped';
    } else {
      clearFocusAndRecenter();
      searchStatus.textContent = '— non trouvé';
      searchStatus.className   = 'notfound';
    }
  }

  searchInput.addEventListener('input', () => handleSearch(searchInput.value));
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { searchInput.value = ''; handleSearch(''); searchInput.blur(); }
    e.stopPropagation();
  });

  document.addEventListener('keydown', e => {
    if (document.activeElement === searchInput) return;
    if (e.key === '/') { e.preventDefault(); searchInput.focus(); searchInput.select(); return; }
    if      (e.key==='ArrowRight'){currentIdx=Math.min(currentIdx+1,periods.length-1);slider.value=currentIdx;loadPeriod(currentCountry,currentIdx);}
    else if (e.key==='ArrowLeft') {currentIdx=Math.max(currentIdx-1,0);slider.value=currentIdx;loadPeriod(currentCountry,currentIdx);}
    else if (e.key===' ')         {e.preventDefault();togglePlay();}
    else if ((e.key==='t'||e.key==='T') && focusedNode) { addTracked(focusedNode); }
    else if (e.key==='Escape')    { if(searchInput.value){searchInput.value='';handleSearch('');} }
  });
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active'); currentCountry=tab.dataset.country;
      renderMediaFilters();
      applyTimelineHeat(currentCountry);
      loadPeriod(currentCountry,currentIdx);
    });
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.country === currentCountry);
  });

  document.getElementById('media-all').addEventListener('click', () => {
    selectedMediaByCountry[currentCountry] = new Set(getAvailableMediaIds(currentCountry));
    syncMediaButtons();
    loadPeriod(currentCountry, currentIdx);
  });

  document.getElementById('media-clear').addEventListener('click', () => {
    selectedMediaByCountry[currentCountry] = new Set();
    syncMediaButtons();
    loadPeriod(currentCountry, currentIdx);
  });

  document.getElementById('media-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    setMediaPanelCollapsed(!mediaPanelCollapsed);
  });

  document.getElementById('loading').style.display = 'none';
  renderMediaFilters();
  setMediaPanelCollapsed(false);
  applyTimelineHeat(currentCountry);
  loadPeriod(currentCountry, currentIdx);

  // Mode par défaut: classement évolutif
  setMode('ranked');

  // ── Lien entrant ?node= ───────────────────────────────────────────────────
  const urlNode = urlParams.get('node');
  if (urlNode) {
    const q = urlNode.toLowerCase();
    let foundId = null;
    for (let i = periods.length - 1; i >= 0 && !foundId; i--) {
      const g = graphs[currentCountry]?.[periods[i].key];
      if (!g) continue;
      const m = (g.nodes || []).find(n => n.id.toLowerCase() === q) ||
                (g.nodes || []).find(n => n.id.toLowerCase().includes(q));
      if (m) foundId = m.id;
    }
    if (foundId) {
      addTracked(foundId);
      setMode('tracking');
    }
  }

  } catch(e) {
    document.getElementById('loading-text').textContent = 'ERREUR: ' + e.message;
    console.error(e);
  }
})();
</script>
<script src="./assets/js/shared-ticker.js"></script>
<script src="./assets/js/shared-menu.js"></script>
</body>

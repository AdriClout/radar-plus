<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Évolution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/shared-menu.css" />
  <link rel="stylesheet" href="./assets/css/shared-ticker.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #00000f; font-family: 'Space Mono', 'SF Mono', monospace; overflow: hidden; height: 100vh; width: 100vw; }
    #graph { display: none; }
    #left-panel {
      position: absolute; top: 0; left: 0; bottom: calc(var(--ticker-height, 44px) + 100px);
      width: 220px;
      display: flex; flex-direction: column; gap: 0;
      padding: 18px 14px 14px;
      background: linear-gradient(to right, rgba(0,0,15,0.96) 80%, transparent);
      z-index: 20; pointer-events: all;
      overflow: hidden;
    }
    #evo-title {
      font-family: 'Orbitron', 'Space Mono', monospace;
      font-size: 22px;
      letter-spacing: 4px;
      color: rgba(195, 220, 255, 0.92);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(90,140,255,0.36), 0 0 26px rgba(70,110,230,0.22);
      margin-bottom: 22px;
      line-height: 1.1;
      white-space: nowrap;
    }
    .lpanel-section {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 14px;
    }
    .lpanel-label {
      font-size: 8px; letter-spacing: 1.8px; text-transform: uppercase;
      color: rgba(100,140,200,0.45); padding-left: 1px;
    }
    #country-tabs { display: flex; gap: 6px; flex-wrap: wrap; pointer-events: all; }
    .tab {
      padding: 5px 14px; border: 1px solid rgba(100,150,255,0.3); border-radius: 3px;
      background: rgba(10,20,50,0.6); color: #7090c0; font-size: 11px;
      letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    }
    .tab:hover  { border-color: rgba(100,150,255,0.7); color: #a0c0ff; }
    .tab.active { background: rgba(40,80,180,0.4); border-color: rgba(120,180,255,0.8); color: #d0e8ff; box-shadow: 0 0 12px rgba(80,130,255,0.3); }
    /* #title supprimé — remplacé par #evo-title dans #left-panel */
    #tooltip {
      position: absolute; pointer-events: none;
      background: rgba(2,4,20,0.96); border: 1px solid rgba(80,120,255,0.35);
      border-radius: 4px; padding: 10px 14px; font-size: 12px; line-height: 1.6;
      display: none; z-index: 20; max-width: 220px;
    }
    #tooltip .n { color: #e8f4ff; font-weight: bold; font-size: 13px; }
    #tooltip .s { color: #6090e0; }
    #tooltip .m { color: #408060; }
    #controls {
      position: absolute; bottom: calc(var(--ticker-height, 44px) + 4px); left: 0; right: 0;
      padding: 16px 24px 20px;
      background: linear-gradient(to top, rgba(0,0,15,0.96) 70%, transparent);
      z-index: 10;
    }
    #period-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      text-align: center;
    }
    #period-current {
      font-size: 13px;
      letter-spacing: 1.2px;
      color: #d8e8ff;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(78, 125, 245, 0.22);
    }
    #period-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: min(940px, calc(100vw - 120px));
    }
    .period-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 10px;
      border: 1px solid rgba(90, 130, 250, 0.18);
      border-radius: 999px;
      background: rgba(8, 18, 48, 0.42);
      color: rgba(154, 186, 235, 0.84);
      font-size: 10px;
      letter-spacing: 0.8px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }
    #slider-row { display: flex; align-items: center; gap: 14px; }
    #play-btn {
      background: none; border: 1px solid rgba(100,150,255,0.35); border-radius: 3px;
      color: #6080a0; font-size: 14px; padding: 4px 10px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    #play-btn:hover  { border-color: rgba(120,180,255,0.8); color: #b0d0ff; }
    #play-btn.playing { color: #ff8080; border-color: rgba(255,100,100,0.5); }
    #timeline {
      flex: 1; -webkit-appearance: none; height: 2px;
      background: linear-gradient(to right, rgba(60,100,200,0.6), rgba(100,60,200,0.6));
      outline: none; border-radius: 2px; cursor: pointer;
    }
    #timeline::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: #7090ff; box-shadow: 0 0 10px rgba(80,120,255,1), 0 0 20px rgba(80,120,255,0.5); cursor: pointer;
    }
    #speed-btn {
      background: none; border: 1px solid rgba(100,150,255,0.2); border-radius: 3px;
      color: #405060; font-size: 10px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
    }
    #speed-btn:hover { color: #7090b0; }
    #top10-panel {
      position: absolute; top: 68px; right: 20px;
      font-family: 'Orbitron', 'Space Mono', monospace;
      z-index: 11;
      width: min(360px, 35vw);
      letter-spacing: 1px;
      border: 1px solid rgba(95, 140, 255, 0.28);
      border-radius: 7px;
      background: linear-gradient(to left, rgba(8,14,40,0.75), rgba(6,10,30,0.48));
      box-shadow: 0 0 20px rgba(60, 100, 210, 0.14);
      padding: 10px 10px 8px;
      backdrop-filter: blur(2px);
    }
    body.has-shared-menu #top10-panel {
      right: 20px;
    }
    body.has-shared-menu #tracked-panel {
      right: 20px;
    }
    body.has-shared-menu .menu-discover-hint {
      display: none;
    }
    #top10-title {
      font-size: 13px;
      color: rgba(182, 208, 255, 0.98);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(78, 125, 245, 0.26);
    }
    #top10-country {
      font-size: 22px;
      color: rgba(200, 224, 255, 0.96);
      text-shadow: 0 0 12px rgba(78, 125, 245, 0.30);
    }
    /* #media-panel supprimé */
    /* styles media-panel supprimés */
    #object-panel {
      position: absolute; right: 20px; bottom: calc(var(--ticker-height, 44px) + 92px); width: min(360px, 35vw); max-height: 38vh;
      overflow: auto; padding: 12px 14px; border: 1px solid rgba(80,120,255,0.35);
      border-radius: 6px; background: rgba(3,6,26,0.93); z-index: 12; display: none;
      box-shadow: 0 0 24px rgba(40,70,180,0.15);
    }
    #object-panel.visible { display: block; }
    #object-panel .h { color: #dcecff; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    #object-panel .meta { color: #7f9fd8; font-size: 11px; margin-bottom: 10px; }
    #object-panel .list { display: flex; flex-direction: column; gap: 8px; }
    #object-panel .it {
      display: block; text-decoration: none; border: 1px solid rgba(80,120,255,0.24);
      background: rgba(8,15,46,0.72); border-radius: 4px; padding: 8px 10px;
      color: #aecdff; font-size: 11px; line-height: 1.4;
    }
    #object-panel .it:hover { border-color: rgba(140,180,255,0.72); color: #e3efff; }
    #object-panel .it-media { display: block; color: #4a7aaa; font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
    #object-panel .empty { color: #5872a8; font-size: 11px; }
    #object-panel .panel-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    #object-panel .panel-link {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(95,140,255,0.4);
      border-radius: 4px;
      padding: 4px 8px;
      color: #b9d6ff;
      font-size: 10px;
      text-decoration: none;
      background: rgba(10,20,50,0.55);
    }
    #object-panel .panel-link:hover { border-color: rgba(145,182,255,0.8); color: #e3efff; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #00000f; z-index: 100; }
    #loading-text { font-size: 11px; letter-spacing: 3px; color: rgba(80,120,255,0.5); text-transform: uppercase; animation: pulse 1.8s ease-in-out infinite; }
    @media (max-width: 1500px) {
      .menu-discover-hint { display: none; }
    }
    @media (max-width: 900px) {
      #left-panel { width: 160px; padding: 12px 10px 10px; }
      #evo-title { font-size: 16px; letter-spacing: 3px; margin-bottom: 14px; }
      .side-nav { width: 280px; right: -280px; }
      body.has-shared-menu #top10-panel { right: 10px; }
      body.has-shared-menu #tracked-panel { right: 10px; }
      #object-panel {
        left: 10px;
        right: 10px;
        width: auto;
        max-height: 30vh;
        bottom: calc(var(--ticker-height, 44px) + 92px);
      }
      #controls { bottom: calc(var(--ticker-height, 44px) + 2px); }
      #period-current { font-size: 11px; letter-spacing: 0.9px; }
      #period-stats { max-width: calc(100vw - 36px); gap: 6px; }
      .period-chip { font-size: 9px; padding: 4px 8px; }
      #ranked-search-wrap {
        width: 100%;
      }
      #ranked-search-input {
        width: 100%;
      }
    }
    @keyframes menuHintFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    /* Mode tabs */
    #mode-tabs { display: flex; flex-direction: column; gap: 4px; pointer-events: all; }
    #mode-tabs-row { display: flex; flex-direction: column; gap: 4px; }
    .mode-tab { padding: 6px 10px; border: 1px solid rgba(100,150,255,0.25); border-radius: 3px; background: rgba(10,20,50,0.5); color: rgba(100,140,200,0.7); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; text-align: left; width: 100%; }
    .mode-tab:hover { border-color: rgba(100,150,255,0.6); color: #a0c0ff; }
    .mode-tab[data-mode="ranked"].active { background: rgba(40,80,180,0.35); border-color: rgba(120,180,255,0.7); color: #d0e8ff; box-shadow: 0 0 10px rgba(80,130,255,0.25); }
    .mode-tab[data-mode="tracking"].active { background: rgba(20,72,52,0.38); border-color: rgba(80,200,140,0.65); color: rgba(140,230,185,0.95); box-shadow: 0 0 10px rgba(60,180,110,0.22); }
    /* Track button (panneau articles) */
    .track-btn { display: inline-block; margin: 0 0 8px; padding: 4px 10px; border: 1px solid rgba(100,150,255,0.3); border-radius: 3px; background: rgba(10,20,50,0.5); color: rgba(140,180,255,0.8); font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
    .track-btn:hover { border-color: rgba(140,190,255,0.7); color: #c0d8ff; }
    .track-btn.tracked { border-color: rgba(80,200,110,0.5); color: rgba(100,220,130,0.9); background: rgba(15,50,25,0.3); }
    /* Evolution view */
    #evolution-view { position: absolute; inset: 0; display: none; z-index: 5; }
    #evolution-view.visible { display: block; }
    #evo-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #tracked-panel { position: absolute; top: 68px; right: 20px; width: min(290px, 30vw); max-height: calc(100vh - 160px); overflow: hidden; border: 1px solid rgba(95,140,255,0.28); border-radius: 7px; background: linear-gradient(to left, rgba(8,14,40,0.88), rgba(6,10,30,0.70)); box-shadow: 0 0 20px rgba(60,100,210,0.14); padding: 10px; z-index: 11; display: flex; flex-direction: column; gap: 8px; backdrop-filter: blur(2px); }
    #tracked-title { font-family: 'Orbitron','Space Mono',monospace; font-size: 12px; color: rgba(182,208,255,0.98); text-transform: uppercase; letter-spacing: 1px; }
    #tracked-head { display: flex; align-items: center; justify-content: space-between; }
    #tracked-clear { border: 1px solid rgba(90,130,250,0.25); border-radius: 5px; background: rgba(8,18,48,0.62); color: rgba(176,206,255,0.95); font-family: 'Space Mono',monospace; font-size: 10px; padding: 4px 8px; cursor: pointer; }
    #tracked-clear:hover { border-color: rgba(145,182,255,0.75); color: rgba(222,236,255,1); }
    #evo-search { background: rgba(5,10,35,0.75); border: 1px solid rgba(100,150,255,0.3); border-radius: 3px; color: #a0c8f0; font-family: 'Space Mono',monospace; font-size: 11px; outline: none; padding: 5px 10px; width: 100%; transition: border-color 0.2s; }
    #evo-search::placeholder { color: rgba(90,120,180,0.55); }
    #evo-search:focus { border-color: rgba(140,190,255,0.75); color: #d0e8ff; }
    #evo-search-results { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
    .evo-result { padding: 5px 8px; border-radius: 3px; background: rgba(8,18,48,0.62); border: 1px solid rgba(90,130,250,0.2); color: rgba(170,200,255,0.9); font-size: 10px; cursor: pointer; transition: all 0.12s; }
    .evo-result:hover { border-color: rgba(145,182,255,0.7); color: #e0f0ff; background: rgba(20,36,86,0.7); }
    #tracked-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
    .tracked-item { display: flex; align-items: center; gap: 8px; border: 1px solid rgba(90,130,250,0.2); border-radius: 5px; background: rgba(8,18,48,0.55); padding: 6px 9px; }
    .tracked-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .tracked-name { flex: 1; font-size: 10px; color: rgba(190,215,255,0.95); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tracked-val { font-size: 10px; color: rgba(140,180,255,0.75); flex-shrink: 0; min-width: 36px; text-align: right; }
    .tracked-rm { background: none; border: none; color: rgba(180,80,80,0.65); cursor: pointer; font-size: 14px; padding: 0 3px; line-height: 1; }
    .tracked-rm:hover { color: rgba(255,110,110,0.9); }
    #evo-empty { color: rgba(104,130,182,0.7); font-size: 10px; padding: 4px 2px; text-align: center; line-height: 1.5; }
    #evo-tooltip { position: fixed; pointer-events: none; display: none; z-index: 30; background: rgba(2,4,20,0.96); border: 1px solid rgba(80,120,255,0.35); border-radius: 4px; padding: 8px 12px; font-size: 11px; line-height: 1.6; }
    #evo-tooltip-period { color: #d0e8ff; font-size: 11px; margin-bottom: 4px; }
    .evo-tt-row { display: flex; align-items: center; gap: 6px; }
    .evo-tt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .evo-tt-name { color: rgba(175,205,255,0.9); flex: 1; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
    .evo-tt-val { color: rgba(160,200,255,0.8); font-size: 10px; }
    /* ── Sélecteur de fenêtre temporelle (dans #left-panel) ─────────────────── */
    #window-row { display: flex; flex-wrap: wrap; gap: 4px; }
    #window-section { display: none; }
    #window-section.visible { display: flex; }
    .win-btn {
      background: rgba(8,16,44,0.55); border: 1px solid rgba(90,130,250,0.22); border-radius: 3px;
      color: rgba(110,150,210,0.65); font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 1px; padding: 4px 8px; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
    }
    .win-btn:hover { border-color: rgba(120,170,255,0.55); color: rgba(180,210,255,0.9); }
    .win-btn.active { border-color: rgba(120,180,255,0.75); background: rgba(30,60,150,0.40); color: #d0e8ff; box-shadow: 0 0 8px rgba(80,130,255,0.2); }
    #window-granularity { font-size: 8px; letter-spacing: 0.7px; color: rgba(90,130,180,0.50); margin-top: 2px; }

    /* ── Légende classement évolutif ──────────────────────────────────────── */
    #ranked-legend-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px;
    }
    #ranked-legend-period {
      font-size: 9px; letter-spacing: 0.7px; color: rgba(120,160,220,0.55); text-transform: uppercase; flex: 1;
    }
    #ranked-legend-more {
      border: 1px solid rgba(90,130,250,0.25); border-radius: 5px;
      background: rgba(8,18,48,0.62); color: rgba(140,180,255,0.8);
      font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
      padding: 3px 7px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    #ranked-legend-more:hover { border-color: rgba(145,182,255,0.75); color: #d0e8ff; }
    #ranked-legend-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 46vh; }
    .rleg-item {
      display: flex; align-items: center; gap: 7px;
      border: 1px solid rgba(90,130,250,0.14); border-radius: 5px;
      background: rgba(8,18,48,0.50); padding: 5px 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .rleg-item:hover, .rleg-item.hovered {
      border-color: rgba(145,182,255,0.55); background: rgba(20,36,86,0.65);
    }
    .rleg-item.focused {
      border-color: rgba(186,211,255,0.88); background: rgba(40,70,150,0.40);
      box-shadow: 0 0 8px rgba(90,135,255,0.28);
    }
    .rleg-item.dimmed { opacity: 0.40; }
    .rleg-swatch {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .rleg-rank {
      font-size: 9px; color: rgba(110,150,210,0.65); flex-shrink: 0; min-width: 14px; text-align: right;
    }
    .rleg-name {
      flex: 1; font-size: 10px; color: rgba(185,215,255,0.92);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .rleg-val { font-size: 10px; color: rgba(140,180,255,0.78); flex-shrink: 0; min-width: 36px; text-align: right; }
    .rleg-val.null-val { color: rgba(100,130,180,0.38); }
    .rleg-delta {
      font-size: 9px; flex-shrink: 0; min-width: 44px; text-align: right; letter-spacing: 0.3px;
    }
    .rleg-delta.up   { color: rgba(80,220,140,0.85); }
    .rleg-delta.down { color: rgba(255,100,100,0.80); }
    .rleg-delta.flat { color: rgba(110,150,200,0.50); }

    .tab:focus-visible,
    .mode-tab:focus-visible,
    .win-btn:focus-visible,
    #ranked-legend-more:focus-visible,
    #play-btn:focus-visible,
    #speed-btn:focus-visible,
    #tracked-clear:focus-visible {
      outline: 2px solid rgba(170, 205, 255, 0.9);
      outline-offset: 2px;
    }

    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    #ranked-search-wrap { display: flex; flex-direction: column; gap: 4px; pointer-events: all; width: 100%; margin: 8px 0 6px; }
    #ranked-search-input {
      background: rgba(5,10,35,0.75); border: 1px solid rgba(100,150,255,0.3);
      border-radius: 3px; color: #a0c8f0; font-family: 'Space Mono','SF Mono',monospace;
      font-size: 11px; letter-spacing: 0.8px; outline: none; padding: 5px 10px;
      width: 100%; transition: border-color 0.2s, box-shadow 0.2s;
    }
    #ranked-search-input::placeholder { color: rgba(90,120,180,0.55); }
    #ranked-search-input:focus { border-color: rgba(140,190,255,0.75); box-shadow: 0 0 10px rgba(80,130,255,0.25); color: #d0e8ff; }
    #ranked-search-results { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }

    #left-tracked-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 170px;
      overflow-y: auto;
    }
    .left-tracked-item {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(90,130,250,0.22);
      border-radius: 4px;
      background: rgba(8,18,48,0.48);
      padding: 5px 7px;
    }
    .left-track-check {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(120,190,150,0.6);
      background: rgba(20,72,52,0.5);
      color: rgba(165,235,195,0.95);
      font-size: 10px;
      line-height: 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .left-track-name {
      flex: 1;
      min-width: 0;
      font-size: 10px;
      color: rgba(190,215,255,0.95);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .left-track-rm {
      border: none;
      background: none;
      color: rgba(190,90,90,0.75);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .left-track-rm:hover { color: rgba(255,120,120,0.95); }
    #left-tracked-empty {
      color: rgba(104,130,182,0.7);
      font-size: 10px;
      line-height: 1.45;
      padding: 2px 0;
    }
    .rleg-item.tracked {
      border-color: rgba(110,210,155,0.72);
      background: rgba(20,72,52,0.50);
      box-shadow: 0 0 6px rgba(110,210,155,0.35);
    }
    .rleg-check {
      font-size: 10px;

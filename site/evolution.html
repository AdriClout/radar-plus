<script>
(async () => {
  try {
  // ── Données ───────────────────────────────────────────────────────────────
  let graphData, tsData;
  try {
    const [gRes, tRes] = await Promise.all([fetch('./graph.json'), fetch('./timeseries.json')]);
    if (!gRes.ok) throw new Error('graph.json: ' + gRes.statusText);
    if (!tRes.ok) throw new Error('timeseries.json: ' + tRes.statusText);
    [graphData, tsData] = await Promise.all([gRes.json(), tRes.json()]);
  } catch(e) {
    const loading = document.getElementById('loading-text');
    if (window.location.protocol === 'file:') {
      loading.textContent = 'ouvrir via http://localhost (pas file://) — ex: ./run_chrome.sh';
    } else {
      loading.textContent = 'fichiers introuvables — lancer build_data.R (' + e.message + ')';
    }
    return;
  }
  // Mode "Classement évolutif" utilise graphData, mode "Suivi personnalisé" utilise tsData.
  // On swap les globals à chaque changement de mode (voir setMode).
  let graphs  = graphData.graphs;
  let periods = graphData.meta.periods;
  const countries   = graphData.meta.countries;
  let graphIdx = graphData.meta.periods.length - 1;
  let tsIdx    = tsData.meta.periods.length - 1;

  const MAX_LINKS_NODE = 5;

  // ── Couleurs ──────────────────────────────────────────────────────────────
  // ── Anti-hairball ─────────────────────────────────────────────────────────
  function filterTopLinks(links, max) {
    const m = new Map();
    links.forEach(l => {
      [l.source, l.target].forEach(k => { if (!m.has(k)) m.set(k,[]); m.get(k).push(l); });
    });
    const kept = new Set();
    m.forEach(ls => { ls.sort((a,b)=>b.value-a.value); ls.slice(0,max).forEach(l=>kept.add(l)); });
    return [...kept];
  }


  function getGD(country, key) {
    const g = graphs[country]?.[key];
    if (!g) return { nodes:[], links:[] };
    let nodes = g.nodes.map(n=>({...n}));
    let links = g.links.map(l=>({...l}));


    nodes.sort((a,b)=>b.size-a.size);
    nodes.forEach((n,i)=>{ n._rank=i; });
    return { nodes, links: filterTopLinks(links, MAX_LINKS_NODE) };
  }

  function periodConvergenceScore(country, key) {
    const g = graphs[country]?.[key];
    if (!g || !Array.isArray(g.nodes) || !g.nodes.length) return 0;

    const sizes = g.nodes.map(n => Number(n.size) || 0).sort((a, b) => b - a);
    const ultra = sizes.slice(0, 3).reduce((a, b) => a + b, 0);
    const linksStrong = (g.links || []).reduce((acc, l) => acc + Math.max(0, (Number(l.value) || 0) - 1), 0);
    const density = linksStrong / Math.max(1, g.nodes.length);

    // Score synthétique: salience ultra + convergence de cooccurrence.
    return ultra * 0.75 + linksStrong * 0.95 + density * 1.6;
  }

  function heatColor(t) {
    const tt = Math.max(0, Math.min(1, t));
    const r = Math.round(30 + tt * 130);
    const g = Math.round(50 + tt * 165);
    const b = Math.round(115 + tt * 125);
    const a = (0.30 + tt * 0.70).toFixed(2);
    return `rgba(${r},${g},${b},${a})`;
  }

  function applyTimelineHeat(country) {
    if (!periods.length) return;
    const scores = periods.map(p => periodConvergenceScore(country, p.key));
    const min = Math.min(...scores);
    const max = Math.max(...scores);
    const denom = Math.max(1e-9, max - min);
    const norm = scores.map(s => (s - min) / denom);

    if (periods.length === 1) {
      slider.style.background = `linear-gradient(to right, ${heatColor(norm[0])}, ${heatColor(norm[0])})`;
      slider.dataset.convScores = JSON.stringify(scores);
      return;
    }

    const stops = [];
    for (let i = 0; i < norm.length; i++) {
      const start = i === 0 ? 0 : ((i - 0.5) / (norm.length - 1)) * 100;
      const end = i === norm.length - 1 ? 100 : ((i + 0.5) / (norm.length - 1)) * 100;
      const c = heatColor(norm[i]);
      stops.push(`${c} ${start.toFixed(2)}%`, `${c} ${end.toFixed(2)}%`);
    }
    slider.style.background = `linear-gradient(to right, ${stops.join(',')})`;
    slider.dataset.convScores = JSON.stringify(scores);
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>'"]/g, c => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[c]));
  }

  function renderArticlesPanel(node, periodLabel = '') {
    const panel = document.getElementById('object-panel');
    if (!node) {
      panel.classList.remove('visible');
      panel.innerHTML = '';
      return;
    }

    const articles = Array.isArray(node.articles) ? node.articles : [];
    const items = articles.map(a => {
      const title = escapeHtml(a.title || a.url || 'Article');
      const url = escapeHtml(a.url || '#');
      const media = a.media_id ? `<span class="it-media">${escapeHtml(a.media_id)}</span>` : '';
      return `<a class="it" href="${url}" target="_blank" rel="noopener noreferrer">${media}${title}</a>`;
    }).join('');
    const constellationUrl = `./constellation.html?country=${encodeURIComponent(currentCountry)}&node=${encodeURIComponent(node.id)}`;
    const radarplusUrl = `./radarplus.html?country=${encodeURIComponent(currentCountry)}&q=${encodeURIComponent(node.id)}`;
    const tracked = trackedObjects.has(node.id);

    const periodLine = periodLabel ? `<div class="meta">Bloc: ${escapeHtml(periodLabel)}</div>` : '';

    panel.innerHTML = `
      <div class="h">${escapeHtml(node.id)}</div>
      ${periodLine}
      <div class="meta">Saillance: ${Number(node.size || 0).toFixed(2)} · Mentions: ${Number(node.n || 0)}</div>
      <button class="track-btn ${tracked ? 'tracked' : ''}" id="track-btn-panel">${tracked ? '✓ Suivi' : '+ Suivre'}</button>
      <div class="panel-actions">
        <a class="panel-link" href="${constellationUrl}" target="_blank" rel="noopener noreferrer">Voir Constellation</a>
        <a class="panel-link" href="${radarplusUrl}" target="_blank" rel="noopener noreferrer">Voir Radar+</a>
      </div>
      <div class="list">${items || '<div class="empty">Aucun article associé dans ce jeu de données.</div>'}</div>
    `;
    panel.classList.add('visible');
    document.getElementById('track-btn-panel').addEventListener('click', () => {
      const btn = document.getElementById('track-btn-panel');
      if (trackedObjects.has(node.id)) {
        removeTracked(node.id);
        btn.textContent = '+ Suivre';
        btn.classList.remove('tracked');
      } else {
        addTracked(node.id);
        btn.textContent = '✓ Suivi';
        btn.classList.add('tracked');
      }
    });
  }

  // ── État ──────────────────────────────────────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const urlCountry = (urlParams.get('country') || '').toUpperCase();
  let currentCountry = countries.includes(urlCountry) ? urlCountry : countries[0];
  let currentIdx     = periods.length - 1;
  let focusedNode    = null;
  let playInterval   = null;
  let playSpeed      = 1500;
  const SPEEDS       = [1500, 700, 250];
  const SPEED_LABELS = ['1×', '2×', '5×'];
  let speedIdx       = 0;

  // ── Suivi Temporel ────────────────────────────────────────────────────────
  const TRACK_COLORS = ['#ff6b6b','#ffd93d','#48dbfb','#ff9ff3','#54a0ff','#00d2d3','#ff9f43','#10ac84','#c7b9ff','#f368e0'];
  let trackedObjects = new Set();
  const trackColorMap = new Map();
  let trackColorSeq = 0;
  let currentMode = 'ranked';
  let evoMaxVal = 1;
  let rankedHoverIdx = null;
  let hoveredNode = null;
  let rankedShowMore = false;
  let rankedGranularity = 'day';
  let rankedSlots = [];
  let rankedSlotIdx = 0;

  const RANKED_GRANULARITIES = {
    day: { topN: 10, emptyLabel: 'Journée' },
    week: { topN: 12, emptyLabel: 'Semaine' },
    month: { topN: 14, emptyLabel: 'Mois' },
    year: { topN: 16, emptyLabel: 'Année' },
  };
  const FR_MONTHS = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
  const FR_MONTHS_SHORT = ['janv.', 'fevr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'aout', 'sept.', 'oct.', 'nov.', 'dec.'];
  const FR_WEEKDAYS_SHORT = ['dim.', 'lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.'];
  const LOCAL_UTC_OFFSET_HOURS = 4; // EDT, cohérent avec le pipeline actuel
  const EN_MONTHS = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06', Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };

  function periodKeyToDate(key) {
    return String(key || '').split('_')[0];
  }

  function dateToWeekKey(dateStr) {
    const d = new Date(`${dateStr}T00:00:00`);
    d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const yearStart = new Date(d.getFullYear(), 0, 4);
    const weekNum = Math.round(((d - yearStart) / 86400000 + yearStart.getDay() + 6) / 7);
    return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
  }

  function dateToMonthKey(dateStr) {
    return dateStr.slice(0, 7);
  }

  function dateToYearKey(dateStr) {
    return dateStr.slice(0, 4);
  }

  function periodDisplayDate(period) {
    const label = String(period?.label || '');
    const m = label.match(/^([A-Za-z]{3})\s+(\d{1,2})/);
    if (m) {
      const month = EN_MONTHS[m[1]];
      const year = String(period?.key || '').split('_')[0]?.split('-')[0] || '1970';
      if (month) return `${year}-${month}-${String(Number(m[2])).padStart(2, '0')}`;
    }
    return periodKeyToDate(period?.key || '');
  }

  function toDayLabel(dateStr) {
    const [y, m, d] = String(dateStr).split('-').map(Number);
    return `${d} ${FR_MONTHS[Math.max(0, (m || 1) - 1)]} ${y}`;
  }

  function toMonthLabel(monthKey) {
    const [year, month] = monthKey.split('-').map(Number);
    return `${FR_MONTHS[Math.max(0, month - 1)]} ${year}`;
  }

  function toWeekLabel(weekKey) {
    const [year, wk] = weekKey.split('-W');
    return `Semaine ${Number(wk)} · ${year}`;
  }

  function buildRankedSlots() {
    if (!periods.length) {
      rankedSlots = [];
      rankedSlotIdx = 0;
      return;
    }

    const buckets = new Map();
    periods.forEach(p => {
      const dateStr = periodDisplayDate(p);
      let bucketKey = dateStr;
      if (rankedGranularity === 'week') bucketKey = dateToWeekKey(dateStr);
      else if (rankedGranularity === 'month') bucketKey = dateToMonthKey(dateStr);
      else if (rankedGranularity === 'year') bucketKey = dateToYearKey(dateStr);
      if (!buckets.has(bucketKey)) buckets.set(bucketKey, []);
      buckets.get(bucketKey).push(p);
    });

    rankedSlots = [...buckets.entries()].map(([bucketKey, slotPeriods]) => {
      let label = bucketKey;
      if (rankedGranularity === 'day') label = toDayLabel(bucketKey);
      else if (rankedGranularity === 'week') label = toWeekLabel(bucketKey);
      else if (rankedGranularity === 'month') label = toMonthLabel(bucketKey);
      return {
        key: bucketKey,
        label,
        periodKeys: slotPeriods.map(p => p.key),
        periods: slotPeriods
      };
    });
  }

  function syncRankedSlotToCurrentPeriod() {
    const currentKey = periods[currentIdx]?.key;
    if (!rankedSlots.length) { rankedSlotIdx = 0; return; }
    const found = rankedSlots.findIndex(slot => slot.periodKeys.includes(currentKey));
    rankedSlotIdx = found >= 0 ? found : rankedSlots.length - 1;
  }

  function setCurrentPeriodFromRankedSlot() {
    const slot = rankedSlots[rankedSlotIdx];
    if (!slot || !slot.periodKeys.length) return;
    if (rankedGranularity === 'day') {
      const now = new Date();
      const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const isToday = slot.key === todayKey;
      const currentBlockStart = Math.floor(now.getHours() / 4) * 4;

      const eligibleKeys = slot.periodKeys.filter(key => {
        if (!isToday) return true;
        const localStart = localBlockStartFromPeriodKey(key);
        return Number.isFinite(localStart) && localStart <= currentBlockStart;
      });

      const fallbackKey = slot.periodKeys[slot.periodKeys.length - 1];
      const pickedKey = eligibleKeys.length ? eligibleKeys[eligibleKeys.length - 1] : fallbackKey;
      const idx = periods.findIndex(p => p.key === pickedKey);
      if (idx >= 0) currentIdx = idx;
      return;
    }

    const lastKey = slot.periodKeys[slot.periodKeys.length - 1];
    const idx = periods.findIndex(p => p.key === lastKey);
    if (idx >= 0) currentIdx = idx;
  }

  function parsePeriodKey(key) {
    // '2026-04-21_00-04' -> Date du debut du bloc
    const [date, time] = key.split('_');
    const h = (time || '00').split('-')[0].padStart(2, '0');
    return new Date(`${date}T${h}:00:00`);
  }

  function localBlockStartFromPeriodKey(key) {
    const timePart = String(key || '').split('_')[1] || '';
    const utcStartRaw = Number(timePart.split('-')[0]);
    if (!Number.isFinite(utcStartRaw)) return null;
    return (utcStartRaw - LOCAL_UTC_OFFSET_HOURS + 24) % 24;
  }

  function getRankedWindowPeriods() {
    const slot = rankedSlots[rankedSlotIdx];
    if (!slot || !slot.periods.length) {
      const fallback = periods[currentIdx];
      return fallback ? [fallback] : [];
    }
    if (rankedGranularity === 'day') {
      const now = new Date();
      const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const isToday = slot.key === todayKey;
      const currentBlockStart = Math.floor(now.getHours() / 4) * 4;
      const starts = [0, 4, 8, 12, 16, 20];
      const byStart = new Map();
      slot.periods.forEach(p => {
        const localStart = localBlockStartFromPeriodKey(p.key);
        if (!Number.isFinite(localStart)) return;
        const isFuture = isToday ? localStart > currentBlockStart : false;
        byStart.set(localStart, { ...p, blockStart: localStart, isFuture });
      });

      return starts.map(start => {
        if (byStart.has(start)) {
          const existing = byStart.get(start);
          if (existing.isFuture) {
            const end = (start + 4) % 24;
            return {
              key: `__synthetic__${slot.key}_${String(start).padStart(2, '0')}-${String(end).padStart(2, '0')}`,
              label: `${slot.label} · ${String(start).padStart(2, '0')}-${String(end).padStart(2, '0')}`,
              blockStart: start,
              isSynthetic: true,
              isFuture: true
            };
          }
          return existing;
        }
        const end = (start + 4) % 24;
        const fakeKey = `__synthetic__${slot.key}_${String(start).padStart(2, '0')}-${String(end).padStart(2, '0')}`;
        return {
          key: fakeKey,
          label: `${slot.label} · ${String(start).padStart(2, '0')}-${String(end).padStart(2, '0')}`,
          blockStart: start,
          isSynthetic: true,
          isFuture: true
        };
      });
    }
    return slot.periods;
  }

  function getRankedTopN() {
    return (RANKED_GRANULARITIES[rankedGranularity] || RANKED_GRANULARITIES.day).topN;
  }

  function updateWindowUI() {
    const winSection = document.getElementById('window-section');
    const granEl = document.getElementById('window-granularity');
    const visible = true; // Afficher les boutons en mode ranked ET tracking
    if (winSection) winSection.classList.toggle('visible', visible);
    if (!visible) return;
    document.querySelectorAll('.win-btn').forEach(b => b.classList.toggle('active', b.dataset.gran === rankedGranularity));
    if (granEl) {
      const slot = rankedSlots[rankedSlotIdx];
      const wp = getRankedWindowPeriods();
      const head = slot?.label || (RANKED_GRANULARITIES[rankedGranularity] || RANKED_GRANULARITIES.day).emptyLabel;
      const completed = wp.filter(p => !p.isFuture).length;
      if (rankedGranularity === 'day') granEl.textContent = `${head} · ${completed} blocs complétés`;
      else granEl.textContent = `${head} · ${wp.length} blocs`;
    }
  }

  function clearFocusAndRecenter() {
    focusedNode = null;
    renderArticlesPanel(null);
  }

  function blockRangeLabelFromPeriod(period) {
    const explicitStart = Number(period?.blockStart);
    const localStart = localBlockStartFromPeriodKey(period?.key);
    const start = Number.isFinite(explicitStart)
      ? explicitStart
      : (Number.isFinite(localStart) ? localStart : 0);
    const end = (start + 4) % 24;
    return `${String(start).padStart(2, '0')} h-${String(end).padStart(2, '0')} h`;
  }

  function updatePeriodSummary(country, idx) {
    const currentEl = document.getElementById('period-current');
    const statsEl = document.getElementById('period-stats');
    const period = periods[idx];
    if (!currentEl || !statsEl) return;
    if (!period) {
      currentEl.textContent = '—';
      statsEl.innerHTML = '';
      return;
    }

    const gd = getGD(country, period.key);
    const peak = gd.nodes.reduce((max, node) => Math.max(max, Number(node.size) || 0), 0);
    const stats = currentMode === 'tracking'
      ? [
          `${gd.nodes.length} objets`,
          `${trackedObjects.size} suivi${trackedObjects.size > 1 ? 's' : ''}`,
          `pic ${peak.toFixed(1)}`
        ]
      : [
          `${gd.nodes.length} objets`,
          `${gd.links.length} liens`,
          `convergence ${periodConvergenceScore(country, period.key).toFixed(1)}`
        ];

    currentEl.textContent = period.label || '—';
    statsEl.innerHTML = stats.map(label => `<span class="period-chip">${escapeHtml(label)}</span>`).join('');
  }

  function loadPeriod(country, idx) {
    const period = periods[idx];
    if (!period) return;
    const gd = getGD(country, period.key);
    focusedNode = null;
    updatePeriodSummary(country, idx);
    const countryEl = document.getElementById('top10-country');
    if (countryEl) countryEl.textContent = country;
    renderArticlesPanel(null);
    if (currentMode === 'tracking') { renderTrackedList(); renderEvolutionChart(); }
    else { renderRankedChart(gd, rankedHoverIdx); }
  }

  // Etoiles de fond
  const STARS = Array.from({ length: 400 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.15,
    a: Math.random() * 0.45 + 0.08,
    tw: Math.random() * Math.PI * 2,
    ts: 0.003 + Math.random() * 0.007
  }));

  window.addEventListener('resize', () => {
    if (currentMode === 'tracking') renderEvolutionChart();
    else {
      const period = periods[currentIdx];
      if (period) renderRankedChart(getGD(currentCountry, period.key));
    }
  });

  function focusNodeById(nodeId) {
    const period = periods[currentIdx];
    const gd = getGD(currentCountry, period?.key);
    const node = (gd.nodes || []).find(n => n.id === nodeId);
    if (!node) return;

    focusedNode = node.id;
    document.getElementById('tooltip').style.display = 'none';
    renderArticlesPanel(node);
  }

  document.addEventListener('mousemove', e => {
    const tt = document.getElementById('tooltip');
    if (tt.style.display === 'block') {
      tt.style.left = Math.min(e.clientX+16, window.innerWidth-240)+'px';
      tt.style.top  = Math.min(e.clientY-10, window.innerHeight-120)+'px';
    }
  });

  // ── Fonctions mode Évolution ──────────────────────────────────────────────
  function getTrackColor(id) {
    if (!trackColorMap.has(id)) { trackColorMap.set(id, TRACK_COLORS[trackColorSeq % TRACK_COLORS.length]); trackColorSeq++; }
    return trackColorMap.get(id);
  }

  function addTracked(id) {
    if (!id || trackedObjects.has(id)) return;
    trackedObjects.add(id); getTrackColor(id);
    renderTrackedList();
    if (currentMode === 'tracking') {
      updatePeriodSummary(currentCountry, currentIdx);
      renderEvolutionChart();
    } else {
      const gd = getGD(currentCountry, periods[currentIdx]?.key);
      renderRankedChart(gd, rankedHoverIdx);
    }
  }

  function removeTracked(id) {
    trackedObjects.delete(id); renderTrackedList();
    if (currentMode === 'tracking') {
      updatePeriodSummary(currentCountry, currentIdx);
      renderEvolutionChart();
    } else {
      const gd = getGD(currentCountry, periods[currentIdx]?.key);
      renderRankedChart(gd, rankedHoverIdx);
    }
  }

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function getAllObjectIds() {
    const ids = new Set();
    Object.values(graphs[currentCountry] || {}).forEach(g => { (g.nodes || []).forEach(n => ids.add(n.id)); });
    return [...ids].sort();
  }

  function getRankedScopedObjectIds() {
    const ids = new Set();
    const wp = getRankedWindowPeriods();
    wp.forEach(p => {
      const g = getGD(currentCountry, p.key);
      (g.nodes || []).forEach(n => ids.add(n.id));
    });
    return [...ids].sort();
  }

  function renderTrackedList() {
    const list = document.getElementById('tracked-list');
    const leftList = document.getElementById('left-tracked-list');
    if (!list) return;
    list.innerHTML = '';
    if (leftList) leftList.innerHTML = '';
    if (!trackedObjects.size) {
      list.innerHTML = '<div id="evo-empty">Recherchez un objet ci-dessus<br>ou cliquez sur "Suivre" dans le classement.</div>';
      if (leftList) leftList.innerHTML = '<div id="left-tracked-empty">Aucun objet suivi.<br>Cliquez un objet du Top 10 ou utilisez la recherche.</div>';
      return;
    }
    const period = periods[currentIdx];
    const g = graphs[currentCountry]?.[period?.key];
    trackedObjects.forEach(id => {
      const color = getTrackColor(id);
      const node = g?.nodes.find(n => n.id === id);
      const val = node ? node.size.toFixed(1) : '—';
      const item = document.createElement('div');
      item.className = 'tracked-item';
      item.innerHTML = `
        <div class="tracked-swatch" style="background:${color};box-shadow:0 0 5px ${color}aa"></div>
        <div class="tracked-name" title="${escapeHtml(id)}">${escapeHtml(id)}</div>
        <div class="tracked-val">${val}</div>
        <button class="tracked-rm" title="Retirer">×</button>
      `;
      item.querySelector('.tracked-rm').addEventListener('click', e => { e.stopPropagation(); removeTracked(id); });
      list.appendChild(item);

      if (leftList) {
        const leftItem = document.createElement('div');
        leftItem.className = 'left-tracked-item';
        leftItem.innerHTML = `
          <div class="left-track-check">✓</div>
          <div class="left-track-name" title="${escapeHtml(id)}">${escapeHtml(id)}</div>
          <button class="left-track-rm" title="Retirer">×</button>
        `;
        leftItem.querySelector('.left-track-rm').addEventListener('click', e => { e.stopPropagation(); removeTracked(id); });
        leftList.appendChild(leftItem);
      }
    });
  }

  function renderEvoSearchResults(q) {
    const resultsEl = document.getElementById('evo-search-results');
    if (!resultsEl) return;
    resultsEl.innerHTML = '';
    if (!q.trim()) return;
    const ql = q.toLowerCase();
    const matches = getAllObjectIds().filter(id => id.toLowerCase().includes(ql) && !trackedObjects.has(id)).slice(0, 7);
    matches.forEach(id => {
      const div = document.createElement('div');
      div.className = 'evo-result';
      div.textContent = id;
      div.addEventListener('click', () => {
        addTracked(id);
        document.getElementById('evo-search').value = '';
        renderEvoSearchResults('');
      });
      resultsEl.appendChild(div);
    });
  }

  function addTrackedAndSwitch(id) {
    if (!id) return;
    addTracked(id);
  }

  function renderRankedSearchResults(q) {
    const resultsEl = document.getElementById('ranked-search-results');
    if (!resultsEl) return;
    resultsEl.innerHTML = '';
    if (!q.trim()) return;
    const ql = q.toLowerCase();
    const matches = getRankedScopedObjectIds()
      .filter(id => id.toLowerCase().includes(ql))
      .filter(id => !trackedObjects.has(id))
      .slice(0, 7);
    matches.forEach(id => {
      const div = document.createElement('div');
      div.className = 'evo-result';
      div.textContent = id;
      div.addEventListener('click', () => {
        addTracked(id);
        const input = document.getElementById('ranked-search-input');
        if (input) input.value = '';
        renderRankedSearchResults('');
      });
      resultsEl.appendChild(div);
    });
  }

  function renderRankedLegend(series, hoverIdx) {
    const list = document.getElementById('ranked-legend-list');
    const periodEl = document.getElementById('ranked-legend-period');
    if (!list) return;

    const winPeriods = getRankedWindowPeriods();
    const isHoverBlock = hoverIdx !== null && hoverIdx >= 0;
    const limit = 10;
    const idx = (hoverIdx !== null && hoverIdx >= 0) ? hoverIdx : winPeriods.findIndex(p => p.key === periods[currentIdx]?.key);
    const safeIdx = idx >= 0 ? idx : winPeriods.length - 1;
    const period = winPeriods[safeIdx];
    const slotLabel = rankedSlots[rankedSlotIdx]?.label || '';
    if (periodEl) {
      if (isHoverBlock) {
        if (rankedGranularity === 'day') periodEl.textContent = `${blockRangeLabelFromPeriod(period)} · Bloc survolé`;
        else periodEl.textContent = `${period?.label || ''} · Bloc survolé`;
      } else {
        periodEl.textContent = `${slotLabel} · Cumul fenêtre`;
      }
    }

    let rows = [];
    if (isHoverBlock) {
      rows = series
        .map(s => {
          const val = s.data[safeIdx] ?? null;
          const prev = safeIdx > 0 ? s.data[safeIdx - 1] ?? null : null;
          const delta = (val !== null && prev !== null) ? val - prev : null;
          return { id: s.id, color: s.color, val, displayVal: val, delta, maxVal: s.maxVal ?? 0 };
        })
        .filter(r => r.val !== null)
        .sort((a, b) => b.val - a.val)
        .slice(0, limit);
    } else {
      rows = series
        .map(s => {
          const cum = s.data.reduce((acc, v) => acc + (v ?? 0), 0);
          const val = s.data[safeIdx] ?? null;
          const prev = safeIdx > 0 ? s.data[safeIdx - 1] ?? null : null;
          const delta = (val !== null && prev !== null) ? val - prev : null;
          return { id: s.id, color: s.color, val, displayVal: cum, delta, maxVal: s.maxVal ?? 0 };
        })
        .sort((a, b) => b.displayVal - a.displayVal)
        .slice(0, limit);
    }

    const hasHover = hoveredNode !== null || focusedNode !== null;
    list.innerHTML = '';
    rows.forEach((r, i) => {
      const isFocused  = focusedNode  === r.id;
      const isHovered  = hoveredNode  === r.id;
      const isTracked  = trackedObjects.has(r.id);
      const isDimmed   = hasHover && !isFocused && !isHovered && !isTracked;

      let deltaTxt = '', deltaClass = 'flat';
      if (r.delta !== null && Math.abs(r.delta) >= 0.01) {
        deltaClass = r.delta > 0 ? 'up' : 'down';
        deltaTxt = `${r.delta > 0 ? '▲' : '▼'} ${Math.abs(r.delta).toFixed(1)}`;
      } else if (r.delta !== null) {
        deltaTxt = '=';
      }

      const item = document.createElement('div');
      item.className = 'rleg-item' +
        (isFocused ? ' focused' : '') +
        (isHovered && !isFocused && !isTracked ? ' hovered' : '') +
        (isDimmed ? ' dimmed' : '') +
        (isTracked ? ' tracked' : '');
      item.dataset.nodeId = r.id;
      item.innerHTML = `
        <div class="rleg-swatch" style="background:${r.color};box-shadow:0 0 5px ${r.color}88"></div>
        <span class="rleg-rank">${i + 1}.</span>
        <span class="rleg-name" title="${escapeHtml(r.id)}">${escapeHtml(r.id)}</span>
        <span class="rleg-check">${isTracked ? '✓' : ''}</span>
        <span class="rleg-val${r.displayVal === null ? ' null-val' : ''}">${r.displayVal !== null ? r.displayVal.toFixed(1) : '—'}</span>
        <span class="rleg-delta ${deltaClass}">${deltaTxt}</span>
      `;

      item.addEventListener('mouseenter', () => {
        hoveredNode = r.id;
        item.classList.add('hovered');
        renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), rankedHoverIdx);
      });
      item.addEventListener('mouseleave', () => {
        hoveredNode = null;
        item.classList.remove('hovered');
        renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), rankedHoverIdx);
      });
      item.addEventListener('click', e => {
        e.stopPropagation();
        const gd = getGD(currentCountry, periods[currentIdx]?.key);
        focusedNode = r.id;
        if (trackedObjects.has(r.id)) removeTracked(r.id);
        else addTracked(r.id);
        renderRankedChart(gd, rankedHoverIdx);
        renderRankedLegend(series, rankedHoverIdx);
      });

      list.appendChild(item);
    });

    // Bouton + Voir plus / moins
    const moreBtn = document.getElementById('ranked-legend-more');
    if (moreBtn) {
      moreBtn.style.display = 'none';
    }
  }

  const rankedSeriesCache = new Map();

  function getRankedSeriesCacheKey(limit, wp) {
    if (!wp.length) {
      const slotKey = rankedSlots[rankedSlotIdx]?.key || 'noslot';
      return `${currentCountry}|${rankedGranularity}|${slotKey}|empty|${limit}`;
    }
    const first = wp[0].key;
    const last = wp[wp.length - 1].key;
    const slotKey = rankedSlots[rankedSlotIdx]?.key || 'noslot';
    return `${currentCountry}|${rankedGranularity}|${slotKey}|${first}|${last}|${wp.length}|${limit}`;
  }

  function clearRankedSeriesCache() {
    rankedSeriesCache.clear();
  }

  function getSeriesColor(i) {
    if (i < TRACK_COLORS.length) return TRACK_COLORS[i];
    const hue = (i * 47) % 360;
    return `hsl(${hue} 78% 62%)`;
  }

  function topIdsForPeriod(periodKey, topN = 10) {
    const g = getGD(currentCountry, periodKey);
    return (g.nodes || [])
      .slice()
      .sort((a, b) => (b.size || 0) - (a.size || 0))
      .slice(0, topN)
      .map(n => n.id);
  }

  function getRankedSeries(gd, limit = Infinity, winPeriods = null) {
    const wp = winPeriods || getRankedWindowPeriods();
    const cacheKey = getRankedSeriesCacheKey(limit, wp);
    if (rankedSeriesCache.has(cacheKey)) return rankedSeriesCache.get(cacheKey);

    // Union des Top 10 locaux de chaque bloc visible.
    const unionIds = new Set();
    const scoreMap = new Map();
    const hitMap = new Map();
    for (const p of wp) {
      const topIds = topIdsForPeriod(p.key, 10);
      const g = getGD(currentCountry, p.key);
      const nodeById = new Map((g.nodes || []).map(nd => [nd.id, nd]));
      for (const id of topIds) {
        unionIds.add(id);
        const val = Number(nodeById.get(id)?.size) || 0;
        scoreMap.set(id, (scoreMap.get(id) || 0) + val);
        hitMap.set(id, (hitMap.get(id) || 0) + 1);
      }
    }

    let topIds = [...unionIds]
      .sort((a, b) => {
        const ds = (scoreMap.get(b) || 0) - (scoreMap.get(a) || 0);
        if (Math.abs(ds) > 1e-9) return ds;
        return (hitMap.get(b) || 0) - (hitMap.get(a) || 0);
      });

    if (Number.isFinite(limit)) topIds = topIds.slice(0, Math.max(0, Math.floor(limit)));

    const series = topIds.map((id, i) => ({
      id,
      color: getSeriesColor(i),
      maxVal: 0,
      data: wp.map(p => {
        const g = getGD(currentCountry, p.key);
        return g.nodes.find(nd => nd.id === id)?.size ?? null;
      })
    }));
    series.forEach(s => {
      s.maxVal = s.data.reduce((mx, v) => (v !== null ? Math.max(mx, v) : mx), 0);
    });
    rankedSeriesCache.set(cacheKey, series);
    return series;
  }

  function getRankedChartLayout(rect) {
    const W = rect.width;
    const leftPanel = document.getElementById('left-panel');
    const compact = W < 960;
    const leftPanelWidth = leftPanel ? leftPanel.getBoundingClientRect().width : 0;
    const leftPad = Math.max(compact ? 140 : 180, Math.ceil(leftPanelWidth + 22));
    const rightPad = getRightPanelPad(rect, ['top10-panel'], 24);
    let bottomPad = 72;
    const controls = document.getElementById('controls');
    if (controls) {
      const controlsRect = controls.getBoundingClientRect();
      const controlsTop = controlsRect.top - rect.top;
      if (Number.isFinite(controlsTop)) bottomPad = Math.max(bottomPad, rect.height - controlsTop + 12);
    }
    const PAD = { top: compact ? 112 : 94, right: rightPad, bottom: bottomPad, left: leftPad };
    const chartW = Math.max(90, rect.width - PAD.left - PAD.right);
    const chartH = Math.max(80, rect.height - PAD.top - PAD.bottom);
    return { PAD, chartW, chartH };
  }

  function getRightPanelPad(rect, panelIds, fallbackPad = 24) {
    const gap = 20;
    let rightPad = fallbackPad;
    for (const panelId of panelIds) {
      const panel = document.getElementById(panelId);
      if (!panel) continue;
      const style = getComputedStyle(panel);
      if (style.display === 'none' || style.visibility === 'hidden') continue;
      const panelRect = panel.getBoundingClientRect();
      if (panelRect.width <= 0 || panelRect.height <= 0) continue;
      const panelOffsetFromRight = Math.max(0, rect.right - panelRect.right);
      rightPad = Math.max(rightPad, Math.ceil(panelRect.width + panelOffsetFromRight + gap));
    }
    return rightPad;
  }

  function periodTickParts(period) {
    if (rankedGranularity === 'day') {
      return { major: blockRangeLabelFromPeriod(period), minor: '' };
    }

    const dateStr = periodDisplayDate(period);
    const [y, m, d] = String(dateStr).split('-').map(Number);
    if (Number.isFinite(y) && Number.isFinite(m) && Number.isFinite(d)) {
      const dt = new Date(`${dateStr}T00:00:00`);
      if (rankedGranularity === 'week') {
        const wd = FR_WEEKDAYS_SHORT[dt.getDay()] || '';
        return { major: `${wd} ${String(d).padStart(2, '0')}`, minor: FR_MONTHS_SHORT[Math.max(0, m - 1)] || '' };
      }
      if (rankedGranularity === 'month') {
        return { major: `${String(d).padStart(2, '0')} ${FR_MONTHS_SHORT[Math.max(0, m - 1)] || ''}`.trim(), minor: '' };
      }
      return { major: `${FR_MONTHS_SHORT[Math.max(0, m - 1)] || ''} ${y}`.trim(), minor: '' };
    }
    const label = String(period?.label || '');
    return { major: label, minor: '' };
  }

  function renderRankedChart(gd, hoverIdx = null) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const W = canvas.width;
    const H = canvas.height;
    if (!W || !H) return;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#00000f';
    ctx.fillRect(0, 0, W, H);

    STARS.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,205,255,${(s.a * 0.35).toFixed(2)})`;
      ctx.fill();
    });

    const winPeriods = getRankedWindowPeriods();
    const series = getRankedSeries(gd, Infinity, winPeriods);
    if (!series.length) return;
    const n = winPeriods.length;
    if (!n) return;

    const { PAD, chartW, chartH } = getRankedChartLayout(rect);
    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const allVals = series.flatMap(s => s.data.filter(v => v !== null));
    const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
    const yOf = v => PAD.top + chartH - (v / maxVal) * chartH;

    // Grid horizontal
    ctx.font = '9px "Space Mono", monospace';
    for (let gi = 0; gi <= 5; gi++) {
      const v = (gi / 5) * maxVal;
      const y = yOf(v);
      ctx.strokeStyle = 'rgba(55,85,175,0.18)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 6]);
      ctx.beginPath();
      ctx.moveTo(PAD.left, y);
      ctx.lineTo(PAD.left + chartW, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(110,150,215,0.55)';
      ctx.textAlign = 'right';
      ctx.fillText(v >= 100 ? v.toFixed(0) : v.toFixed(1), PAD.left - 8, y + 3);
    }

    // Axes + X ticks
    const xStep = Math.max(1, Math.floor(n / 10));
    winPeriods.forEach((p, i) => {
      if (i % xStep !== 0 && i !== n - 1) return;
      const x = xOf(i);
      ctx.strokeStyle = 'rgba(55,85,175,0.22)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, PAD.top + chartH);
      ctx.lineTo(x, PAD.top + chartH + 5);
      ctx.stroke();
      ctx.fillStyle = 'rgba(100,140,205,0.5)';
      ctx.textAlign = 'center';
      const parts = periodTickParts(p);
      ctx.fillText(parts.major, x, H - PAD.bottom + 22);
      if (parts.minor) {
        ctx.fillStyle = 'rgba(80,120,180,0.38)';
        ctx.fillText(parts.minor, x, H - PAD.bottom + 34);
      }
    });

    ctx.strokeStyle = 'rgba(75,115,195,0.22)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PAD.left, PAD.top);
    ctx.lineTo(PAD.left, PAD.top + chartH);
    ctx.lineTo(PAD.left + chartW, PAD.top + chartH);
    ctx.stroke();

    // Index de la période courante dans winPeriods (avant le tracé des dots)
    const winCurrentIdx = winPeriods.findIndex(p => p.key === periods[currentIdx]?.key);

    // Lignes des objets Top 10
    const hasActiveNode = focusedNode !== null || hoveredNode !== null;
    series.forEach(s => {
      const [r, g, b] = hexToRgb(s.color);
      const isFocused  = focusedNode  === s.id;
      const isHovered  = hoveredNode  === s.id;
      const isTracked  = trackedObjects.has(s.id);
      const isActive   = isFocused || isHovered || isTracked;
      const isDimmed   = hasActiveNode && !isActive;
      const lineAlpha  = isDimmed ? 0.18 : 1;

      ctx.beginPath();
      let first = true;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i);
        const y = yOf(v);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = isDimmed
        ? `rgba(${r},${g},${b},0.18)`
        : s.color;
      ctx.lineWidth  = isActive ? 3.2 : 2;
      ctx.shadowColor = s.color;
      ctx.shadowBlur  = isActive ? 14 : (isDimmed ? 0 : 7);
      ctx.stroke();
      ctx.shadowBlur = 0;

      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i);
        const y = yOf(v);
        const isCurrent = i === winCurrentIdx;
        const radius = isCurrent ? (isActive ? 5 : 4) : 2.2;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = isDimmed
          ? `rgba(${r},${g},${b},0.18)`
          : (isCurrent ? `rgba(${r},${g},${b},0.98)` : `rgba(${r},${g},${b},0.76)`);
        ctx.fill();
      });
    });

    // Appel légende dynamique (sans boucle infinie)
    requestAnimationFrame(() => renderRankedLegend(series, hoverIdx));

    // Marqueur de période courante
    if (winCurrentIdx >= 0) {
      const cx = xOf(winCurrentIdx);
      ctx.strokeStyle = 'rgba(180,210,255,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.beginPath();
      ctx.moveTo(cx, PAD.top - 8);
      ctx.lineTo(cx, PAD.top + chartH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(180,210,255,0.5)';
      ctx.font = '9px "Space Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▼', cx, PAD.top - 10);
    }

    // Marqueur de hover
    if (hoverIdx !== null && hoverIdx >= 0 && hoverIdx < n) {
      const hx = xOf(hoverIdx);
      ctx.strokeStyle = 'rgba(200,220,255,0.18)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.moveTo(hx, PAD.top);
      ctx.lineTo(hx, PAD.top + chartH);
      ctx.stroke();
      ctx.setLineDash([]);
      series.forEach(s => {
        const v = s.data[hoverIdx];
        if (v === null) return;
        ctx.beginPath();
        ctx.arc(hx, yOf(v), focusedNode === s.id ? 6.2 : 5, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 12;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }
  }

  function rankedChartHoverAt(clientX, clientY) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas || currentMode !== 'ranked') return;
    const rect = canvas.getBoundingClientRect();
    const { PAD, chartW } = getRankedChartLayout(rect);
    const winPeriods = getRankedWindowPeriods();
    const n = winPeriods.length;
    const canvasX = clientX - rect.left;

    if (canvasX < PAD.left || canvasX > PAD.left + chartW) {
      rankedHoverIdx = null;
      renderRankedChart(getGD(currentCountry, periods[currentIdx]?.key), null);
      return;
    }

    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));
    rankedHoverIdx = idx;
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    renderRankedChart(gd, idx);
    // La légende est mise à jour par renderRankedChart via requestAnimationFrame.
  }

  function getEvolutionChartLayout(rect) {
    const fallbackPanelPad = Math.min(310, rect.width * 0.30) + 30;
    const panelW = getRightPanelPad(rect, ['tracked-panel'], fallbackPanelPad);
    let bottomPad = 72;
    const controls = document.getElementById('controls');
    if (controls) {
      const controlsRect = controls.getBoundingClientRect();
      const controlsTop = controlsRect.top - rect.top;
      if (Number.isFinite(controlsTop)) {
        // Garder l'axe X et les points bas au-dessus de la zone des contrôles.
        bottomPad = Math.max(bottomPad, rect.height - controlsTop + 12);
      }
    }
    const PAD = { top: 88, right: panelW, bottom: bottomPad, left: 72 };
    const chartW = Math.max(100, rect.width - PAD.left - PAD.right);
    const chartH = Math.max(80, rect.height - PAD.top - PAD.bottom);
    return { PAD, panelW, chartW, chartH };
  }

  function renderEvolutionChart(hoverIdx = null) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas || currentMode !== 'tracking') return;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    const W = canvas.width, H = canvas.height;
    if (!W || !H) return;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#00000f'; ctx.fillRect(0, 0, W, H);
    STARS.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,205,255,${(s.a * 0.35).toFixed(2)})`; ctx.fill();
    });

    const { PAD, chartW, chartH } = getEvolutionChartLayout(rect);
    const n = periods.length;

    if (!trackedObjects.size) {
      ctx.fillStyle = 'rgba(120,160,220,0.35)'; ctx.font = '13px "Space Mono", monospace'; ctx.textAlign = 'center';
      ctx.fillText('Ajoutez des objets pour visualiser leur évolution', PAD.left + chartW / 2, H / 2);
      ctx.fillStyle = 'rgba(80,110,160,0.4)'; ctx.font = '10px "Space Mono", monospace';
      ctx.fillText('Recherchez à droite, ou cliquez "Suivre" sur un objet', PAD.left + chartW / 2, H / 2 + 26);
      return;
    }

    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const yOf = (v, mx) => PAD.top + chartH - (v / mx) * chartH;

    const series = [...trackedObjects].map(id => ({
      id, color: getTrackColor(id),
      data: periods.map(p => { const g = graphs[currentCountry]?.[p.key]; return g?.nodes.find(nd => nd.id === id)?.size ?? null; })
    }));
    const allVals = series.flatMap(s => s.data.filter(v => v !== null));
    const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
    evoMaxVal = maxVal;

    // Grid
    ctx.font = '9px "Space Mono", monospace';
    for (let gi = 0; gi <= 5; gi++) {
      const v = (gi / 5) * maxVal, y = yOf(v, maxVal);
      ctx.strokeStyle = 'rgba(55,85,175,0.18)'; ctx.lineWidth = 1; ctx.setLineDash([3, 6]);
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + chartW, y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(110,150,215,0.55)'; ctx.textAlign = 'right';
      ctx.fillText(v >= 100 ? v.toFixed(0) : v.toFixed(1), PAD.left - 8, y + 3);
    }

    // X ticks
    const xStep = Math.max(1, Math.floor(n / 10));
    periods.forEach((p, i) => {
      if (i % xStep !== 0 && i !== n - 1) return;
      const x = xOf(i);
      ctx.strokeStyle = 'rgba(55,85,175,0.22)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, PAD.top + chartH); ctx.lineTo(x, PAD.top + chartH + 5); ctx.stroke();
      ctx.fillStyle = 'rgba(100,140,205,0.5)'; ctx.textAlign = 'center';
      const date = p.label.length > 10 ? p.label.slice(0, 10) : p.label;
      const rest = p.label.slice(10).trim();
      ctx.fillText(date, x, H - PAD.bottom + 22);
      if (rest) { ctx.fillStyle = 'rgba(80,120,180,0.38)'; ctx.fillText(rest, x, H - PAD.bottom + 34); }
    });

    // Axes
    ctx.strokeStyle = 'rgba(75,115,195,0.22)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top + chartH); ctx.lineTo(PAD.left + chartW, PAD.top + chartH); ctx.stroke();

    // Series: area + line + dots
    series.forEach(s => {
      const [r2, g2, b2] = hexToRgb(s.color);
      // Area fill
      ctx.beginPath();
      let first = true, lastX = null;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i), y = yOf(v, maxVal);
        if (first) { ctx.moveTo(x, PAD.top + chartH); ctx.lineTo(x, y); first = false; } else ctx.lineTo(x, y);
        lastX = x;
      });
      if (lastX !== null) { ctx.lineTo(lastX, PAD.top + chartH); ctx.closePath(); ctx.fillStyle = `rgba(${r2},${g2},${b2},0.07)`; ctx.fill(); }
      // Line
      ctx.beginPath(); first = true;
      s.data.forEach((v, i) => {
        if (v === null) return;
        const x = xOf(i), y = yOf(v, maxVal);
        if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.shadowColor = s.color; ctx.shadowBlur = 7; ctx.stroke(); ctx.shadowBlur = 0;
      // Dots
      s.data.forEach((v, i) => {
        if (v === null) return;
        ctx.beginPath(); ctx.arc(xOf(i), yOf(v, maxVal), 2.5, 0, Math.PI * 2); ctx.fillStyle = s.color; ctx.fill();
      });
    });

    // Hover dots + vertical line
    if (hoverIdx !== null && hoverIdx >= 0 && hoverIdx < n) {
      ctx.strokeStyle = 'rgba(200,220,255,0.18)'; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(xOf(hoverIdx), PAD.top); ctx.lineTo(xOf(hoverIdx), PAD.top + chartH); ctx.stroke(); ctx.setLineDash([]);
      series.forEach(s => {
        const v = s.data[hoverIdx]; if (v === null) return;
        ctx.beginPath(); ctx.arc(xOf(hoverIdx), yOf(v, maxVal), 5, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.shadowColor = s.color; ctx.shadowBlur = 12; ctx.fill(); ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
      });
    }

    // Current period marker
    if (currentIdx >= 0 && currentIdx < n) {
      const cx = xOf(currentIdx);
      ctx.strokeStyle = 'rgba(180,210,255,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
      ctx.beginPath(); ctx.moveTo(cx, PAD.top - 8); ctx.lineTo(cx, PAD.top + chartH); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(180,210,255,0.5)'; ctx.font = '9px "Space Mono", monospace'; ctx.textAlign = 'center';
      ctx.fillText('▼', cx, PAD.top - 10);
    }
  }

  function evoChartHoverAt(clientX, clientY) {
    const canvas = document.getElementById('evo-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const { PAD, chartW } = getEvolutionChartLayout(rect);
    const n = periods.length;
    const canvasX = clientX - rect.left;
    if (canvasX < PAD.left || canvasX > PAD.left + chartW) {
      renderEvolutionChart(null);
      document.getElementById('evo-tooltip').style.display = 'none'; return;
    }
    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));
    renderEvolutionChart(idx);

    const tt = document.getElementById('evo-tooltip');
    const period = periods[idx];
    document.getElementById('evo-tooltip-period').textContent = period?.label || '';
    const series = [...trackedObjects].map(id => {
      const g = graphs[currentCountry]?.[period?.key];
      return { id, color: getTrackColor(id), val: g?.nodes.find(nd => nd.id === id)?.size ?? null };
    });
    document.getElementById('evo-tooltip-items').innerHTML = series.map(s =>
      `<div class="evo-tt-row"><div class="evo-tt-dot" style="background:${s.color}"></div><div class="evo-tt-name">${escapeHtml(s.id)}</div><div class="evo-tt-val">${s.val !== null ? s.val.toFixed(2) : '—'}</div></div>`
    ).join('');
    let tx = clientX + 16, ty = clientY - 10;
    const ttW = 220, ttH = tt.offsetHeight || 50;
    if (tx + ttW > window.innerWidth) tx = clientX - ttW - 10;
    if (ty + ttH > window.innerHeight) ty = clientY - ttH - 10;
    tt.style.left = tx + 'px'; tt.style.top = ty + 'px'; tt.style.display = 'block';
  }

  function syncRankedNavigationState() {
    buildRankedSlots();
    syncRankedSlotToCurrentPeriod();
    setCurrentPeriodFromRankedSlot();
    slider.max = Math.max(0, rankedSlots.length - 1);
    slider.value = rankedSlotIdx;
  }

  function getTrackingPeriodsForCurrentFilters() {
    const allTsPeriods = (tsData?.meta?.periods || []).slice();
    const slot = rankedSlots[rankedSlotIdx];
    if (!slot || !slot.periodKeys?.length) return allTsPeriods;
    const keySet = new Set(slot.periodKeys);
    const filtered = allTsPeriods.filter(p => keySet.has(p.key));
    return filtered.length ? filtered : allTsPeriods;
  }

  function setMode(mode) {
    // Sauvegarder l'index courant avant de changer de mode
    if (currentMode === 'ranked') graphIdx = currentIdx;
    else tsIdx = currentIdx;

    currentMode = mode;
    clearRankedSeriesCache();
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

    // Swapper les données + slider selon le mode
    if (mode === 'tracking') {
      graphs  = tsData.graphs;
      rankedGranularity = 'year'; // Défaut: Année en mode Suivi
      buildRankedSlots(); // Reconstruire les slots avec la granularité année
      periods = getTrackingPeriodsForCurrentFilters();
      currentIdx = Math.min(tsIdx, Math.max(0, periods.length - 1));
      slider.max = periods.length - 1;
      slider.value = currentIdx;
    } else {
      graphs  = graphData.graphs;
      periods = graphData.meta.periods;
      currentIdx = Math.min(graphIdx, periods.length - 1);
      syncRankedNavigationState();
    }

    const evoView = document.getElementById('evolution-view');
    const top10El = document.getElementById('top10-panel');
    const trackedEl = document.getElementById('tracked-panel');
    updatePeriodSummary(currentCountry, currentIdx);
    if (mode === 'tracking') {
      evoView.classList.add('visible');
      if (top10El) top10El.style.display = 'none';
      trackedEl.style.display = '';
      rankedHoverIdx = null;
      document.getElementById('evo-tooltip').style.display = 'none';
      renderTrackedList(); renderEvolutionChart();
    } else {
      evoView.classList.add('visible');
      if (top10El) top10El.style.display = '';
      trackedEl.style.display = 'none';
      applyTimelineHeat(currentCountry);
      syncRankedNavigationState();
      loadPeriod(currentCountry, currentIdx);
    }
    updateWindowUI();
  }

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => tab.addEventListener('click', () => setMode(tab.dataset.mode)));

  // Boutons fenêtre temporelle (mode ranked et tracking)
  document.querySelectorAll('.win-btn').forEach(btn => btn.addEventListener('click', () => {
    rankedGranularity = btn.dataset.gran || 'day';
    rankedHoverIdx = null;
    rankedShowMore = false;
    clearRankedSeriesCache();
    buildRankedSlots(); // Reconstruire les slots avec la nouvelle granularité
    syncRankedNavigationState();
    updateWindowUI();
    if (currentMode === 'tracking') {
      periods = getTrackingPeriodsForCurrentFilters();
      currentIdx = Math.min(currentIdx, Math.max(0, periods.length - 1));
      slider.max = periods.length - 1;
      slider.value = currentIdx;
      renderTrackedList();
      renderEvolutionChart();
    } else {
      const gd = getGD(currentCountry, periods[currentIdx]?.key);
      renderRankedChart(gd, null);
    }
  }));

  // Bouton + Voir plus dans la légende ranked
  document.getElementById('ranked-legend-more').addEventListener('click', () => {
    rankedShowMore = !rankedShowMore;
    const gd = getGD(currentCountry, periods[currentIdx]?.key);
    const series = getRankedSeries(gd, Infinity);
    renderRankedLegend(series, rankedHoverIdx);
  });

  // Evolution canvas events
  const evoCanvas = document.getElementById('evo-canvas');
  evoCanvas.addEventListener('mousemove', e => {
    if (currentMode === 'tracking') evoChartHoverAt(e.clientX, e.clientY);
    else rankedChartHoverAt(e.clientX, e.clientY);
  });
  evoCanvas.addEventListener('mouseleave', () => {
    if (currentMode === 'tracking') renderEvolutionChart(null);
    else {
      rankedHoverIdx = null;
      const period = periods[currentIdx];
      renderRankedChart(getGD(currentCountry, period?.key), null);
    }
    document.getElementById('evo-tooltip').style.display = 'none';
  });
  evoCanvas.addEventListener('click', e => {
    if (currentMode === 'ranked') {
      // Sélectionne l'objet le plus proche du clic à la période visée.
      const period = periods[currentIdx];
      const gd = getGD(currentCountry, period?.key);
      const winPeriods = getRankedWindowPeriods();
      const series = getRankedSeries(gd, Infinity, winPeriods);
      if (!series.length) return;
      const rect = evoCanvas.getBoundingClientRect();
      const { PAD, chartW, chartH } = getRankedChartLayout(rect);
      const n = winPeriods.length;
      const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
      const allVals = series.flatMap(s => s.data.filter(v => v !== null));
      const maxVal = allVals.length ? Math.max(...allVals, 0.1) : 1;
      const yOf = v => PAD.top + chartH - (v / maxVal) * chartH;
      const canvasX = e.clientX - rect.left;
      const canvasY = e.clientY - rect.top;
      if (canvasX < PAD.left || canvasX > PAD.left + chartW) return;
      const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));

      let hitId = null;
      let bestDist = Infinity;
      series.forEach(s => {
        const v = s.data[idx];
        if (v === null) return;
        const dist = Math.hypot(canvasX - xOf(idx), canvasY - yOf(v));
        if (dist < bestDist) {
          bestDist = dist;
          hitId = s.id;
        }
      });
      if (hitId && bestDist <= 18) {
        focusedNode = hitId;
        const clickedPeriod = winPeriods[idx];
        const periodGraph = getGD(currentCountry, clickedPeriod?.key);
        const node = (periodGraph.nodes || []).find(n2 => n2.id === hitId);
        const exactIdx = periods.findIndex(p => p.key === clickedPeriod?.key);
        if (exactIdx >= 0) {
          currentIdx = exactIdx;
          updatePeriodSummary(currentCountry, currentIdx);
        }
        if (node) renderArticlesPanel(node, clickedPeriod?.label || blockRangeLabelFromPeriod(clickedPeriod));
        else renderArticlesPanel(null);
        renderRankedChart(gd, rankedHoverIdx);
      }
      return;
    }
    const rect = evoCanvas.getBoundingClientRect();
    const { PAD, chartW, chartH } = getEvolutionChartLayout(rect);
    const n = periods.length;
    const canvasX = e.clientX - rect.left;
    const canvasY = e.clientY - rect.top;
    if (canvasX < PAD.left || canvasX > PAD.left + chartW) { renderArticlesPanel(null); return; }
    const idx = Math.max(0, Math.min(n - 1, Math.round(((canvasX - PAD.left) / chartW) * (n - 1))));

    // Cherche un point proche du clic (rayon 20px, on teste ±1 période)
    const xOf = i => PAD.left + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2);
    const yOf = v => PAD.top + chartH - (v / Math.max(evoMaxVal, 0.1)) * chartH;
    const HIT_R = 20;
    let hitNode = null;
    let hitPi = null;
    outer: for (const id of trackedObjects) {
      for (let di = -1; di <= 1; di++) {
        const pi = idx + di;
        if (pi < 0 || pi >= n) continue;
        const node = graphs[currentCountry]?.[periods[pi]?.key]?.nodes.find(nd => nd.id === id);
        if (!node) continue;
        if (Math.hypot(canvasX - xOf(pi), canvasY - yOf(node.size)) < HIT_R) { hitNode = node; hitPi = pi; break outer; }
      }
    }

    currentIdx = hitPi !== null ? hitPi : idx;
    slider.value = currentIdx;
    loadPeriod(currentCountry, currentIdx);
    if (hitNode) renderArticlesPanel(hitNode, periods[currentIdx]?.label || '');
  });

  // Evolution search
  document.getElementById('evo-search').addEventListener('input', e => renderEvoSearchResults(e.target.value));
  document.getElementById('evo-search').addEventListener('keydown', e => { if (e.key === 'Escape') { e.target.value = ''; renderEvoSearchResults(''); } e.stopPropagation(); });
  document.getElementById('tracked-clear').addEventListener('click', () => {
    trackedObjects.clear(); trackColorMap.clear(); trackColorSeq = 0;
    renderTrackedList();
    if (currentMode === 'tracking') {
      updatePeriodSummary(currentCountry, currentIdx);
      renderEvolutionChart();
    }
  });

  const slider = document.getElementById('timeline');
  slider.max = periods.length-1; slider.value = currentIdx;
  slider.addEventListener('input', () => {
    if (currentMode === 'ranked') {
      rankedSlotIdx = +slider.value;
      setCurrentPeriodFromRankedSlot();
    } else {
      currentIdx = +slider.value;
    }
    loadPeriod(currentCountry,currentIdx);
  });

  const playBtn = document.getElementById('play-btn');
  function advance() {
    if (currentMode === 'ranked') {
      const count = Math.max(1, rankedSlots.length);
      rankedSlotIdx = (rankedSlotIdx + 1) % count;
      slider.value = rankedSlotIdx;
      setCurrentPeriodFromRankedSlot();
    } else {
      currentIdx = (currentIdx + 1) % periods.length;
      slider.value = currentIdx;
    }
    loadPeriod(currentCountry,currentIdx);
  }
  function togglePlay() {
    if (playInterval) {
      clearInterval(playInterval);
      playInterval = null;
      playBtn.textContent = '▶';
      playBtn.classList.remove('playing');
      playBtn.setAttribute('aria-pressed', 'false');
    } else {
      playBtn.textContent = '⏸';
      playBtn.classList.add('playing');
      playBtn.setAttribute('aria-pressed', 'true');
      playInterval = setInterval(advance, playSpeed);
    }
  }
  playBtn.addEventListener('click', togglePlay);
  document.getElementById('speed-btn').addEventListener('click', () => {
    speedIdx=(speedIdx+1)%SPEEDS.length; playSpeed=SPEEDS[speedIdx];
    document.getElementById('speed-btn').textContent=SPEED_LABELS[speedIdx];
    if (playInterval) { clearInterval(playInterval); playInterval=setInterval(advance,playSpeed); }
  });
  // ── Recherche dédiée (panneau droit) ─────────────────────────────────────
  const rankedSearchInput = document.getElementById('ranked-search-input');
  rankedSearchInput.addEventListener('input', () => renderRankedSearchResults(rankedSearchInput.value));
  rankedSearchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      rankedSearchInput.value = '';
      renderRankedSearchResults('');
      rankedSearchInput.blur();
    } else if (e.key === 'Enter') {
      const q = rankedSearchInput.value.trim().toLowerCase();
      const id = getRankedScopedObjectIds().find(v => v.toLowerCase().includes(q));
      if (id) {
        addTracked(id);
        rankedSearchInput.value = '';
        renderRankedSearchResults('');
      }
    }
    e.stopPropagation();
  });

  document.addEventListener('keydown', e => {
    if (document.activeElement === rankedSearchInput || document.activeElement === document.getElementById('evo-search')) return;
    if (e.key === '/') { e.preventDefault(); rankedSearchInput.focus(); rankedSearchInput.select(); return; }
    if (e.key === 'ArrowRight') {
      if (currentMode === 'ranked') {
        rankedSlotIdx = Math.min(rankedSlotIdx + 1, Math.max(0, rankedSlots.length - 1));
        slider.value = rankedSlotIdx;
        setCurrentPeriodFromRankedSlot();
      } else {
        currentIdx = Math.min(currentIdx + 1, periods.length - 1);
        slider.value = currentIdx;
      }
      loadPeriod(currentCountry,currentIdx);
    }
    else if (e.key === 'ArrowLeft') {
      if (currentMode === 'ranked') {
        rankedSlotIdx = Math.max(rankedSlotIdx - 1, 0);
        slider.value = rankedSlotIdx;
        setCurrentPeriodFromRankedSlot();
      } else {
        currentIdx = Math.max(currentIdx - 1, 0);
        slider.value = currentIdx;
      }
      loadPeriod(currentCountry,currentIdx);
    }
    else if (e.key===' ')         {e.preventDefault();togglePlay();}
    else if ((e.key==='t'||e.key==='T') && focusedNode) { addTracked(focusedNode); }
    else if (e.key==='Escape')    { if(rankedSearchInput.value){rankedSearchInput.value='';renderRankedSearchResults('');} }
  });
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active'); currentCountry=tab.dataset.country;
      tab.setAttribute('aria-selected', 'true');
      clearRankedSeriesCache();
      applyTimelineHeat(currentCountry);
      if (currentMode === 'ranked') {
        syncRankedNavigationState();
      }
      loadPeriod(currentCountry,currentIdx);
    });
  });

  document.addEventListener('click', e => {
    const panel = document.getElementById('object-panel');
    if (!panel || !panel.classList.contains('visible')) return;
    if (panel.contains(e.target)) return;
    if (e.target.closest('.rleg-item')) return;
    if (e.target.closest('.tracked-item')) return;
    if (e.target.closest('.left-tracked-item')) return;
    if (e.target.closest('#evo-canvas')) return;
    renderArticlesPanel(null);
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.country === currentCountry);
    tab.setAttribute('aria-selected', String(tab.dataset.country === currentCountry));
  });

  document.getElementById('loading').style.display = 'none';
  applyTimelineHeat(currentCountry);
  loadPeriod(currentCountry, currentIdx);

  // Mode par défaut: classement évolutif
  setMode('ranked');
  renderTrackedList();

  // ── Lien entrant ?node= ───────────────────────────────────────────────────
  const urlNode = urlParams.get('node');
  if (urlNode) {
    const q = urlNode.toLowerCase();
    let foundId = null;
    for (let i = periods.length - 1; i >= 0 && !foundId; i--) {
      const g = graphs[currentCountry]?.[periods[i].key];
      if (!g) continue;
      const m = (g.nodes || []).find(n => n.id.toLowerCase() === q) ||
                (g.nodes || []).find(n => n.id.toLowerCase().includes(q));
      if (m) foundId = m.id;
    }
    if (foundId) {
      addTracked(foundId);
      setMode('tracking');
    }
  }

  } catch(e) {
    document.getElementById('loading-text').textContent = 'ERREUR: ' + e.message;
    console.error(e);
  }
})();
</script>
<script src="./assets/js/shared-ticker.js"></script>
<script src="./assets/js/shared-menu.js"></script>
</body>

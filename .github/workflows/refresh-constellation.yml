name: Refresh Constellation Data

on:
  schedule:
    # 30min après chaque run Glue (00:03, 04:03, 08:03, 12:03, 16:03, 20:03 UTC)
    - cron: '33 0,4,8,12,16,20 * * *'
  workflow_dispatch: # Déclenchement manuel possible

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-constellation-v3-${{ hashFiles('constellation/build_data.R') }}
          restore-keys: r-constellation-v3-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev jq

      - name: Install R packages
        run: |
          install.packages(
            c("jsonlite", "dplyr", "purrr", "tidyr", "stringr", "readr"),
            repos = "https://cloud.r-project.org",
            INSTALL_opts = c("--no-help", "--no-html", "--no-docs")
          )
        shell: Rscript {0}

      - name: Fetch Athena data (Python boto3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          AWS_DEFAULT_REGION: ca-central-1
        run: |
          pip install boto3 --quiet
          python3 constellation/fetch_data.py

      - name: Build constellation data (R)
        run: Rscript constellation/build_data.R

      - name: Commit & push updated data
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add constellation/graph.json constellation/timeseries.json constellation/monitor_input.json
          if git diff --staged --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh constellation data"
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger GitHub Pages deploy
        if: steps.commit_data.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-github-pages.yml --ref main

      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "${NETLIFY_BUILD_HOOK_URL}" ]; then
            echo "NETLIFY_BUILD_HOOK_URL absent: skipping explicit Netlify deploy trigger."
            exit 0
          fi
          curl -fsS -X POST "${NETLIFY_BUILD_HOOK_URL}"

      - name: Validate live site is updated
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${NETLIFY_BUILD_HOOK_URL}" ]; then
            echo "NETLIFY_BUILD_HOOK_URL absent: skipping live site validation."
            exit 0
          fi

          expected_graph="$(jq -r '.meta.generated_at' constellation/graph.json)"
          expected_timeseries="$(jq -r '.meta.generated_at' constellation/timeseries.json)"

          echo "Expected graph.json meta.generated_at: ${expected_graph}"
          echo "Expected timeseries.json meta.generated_at: ${expected_timeseries}"

          for attempt in $(seq 1 30); do
            live_graph="$(curl -fsS https://radarplus.org/graph.json | jq -r '.meta.generated_at')"
            live_timeseries="$(curl -fsS https://radarplus.org/timeseries.json | jq -r '.meta.generated_at')"

            echo "Attempt ${attempt}/30 -> graph: ${live_graph} | timeseries: ${live_timeseries}"

            if [ "${live_graph}" = "${expected_graph}" ] && [ "${live_timeseries}" = "${expected_timeseries}" ]; then
              echo "Live site data is in sync with refreshed JSON files."
              exit 0
            fi

            sleep 20
          done

          echo "Timed out waiting for radarplus.org to serve the refreshed JSON files."
          exit 1

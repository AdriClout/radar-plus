name: Refresh Constellation Data

on:
  schedule:
    # Les raffineurs RADAR_SALIENT_INDEX (:42) et RADAR_HEADLINE_OF_HEADLINES (:46) tournent
    # à minuit, 4h, 8h, 12h, 16h, 20h heure locale Montréal (DST géré par EventBridge).
    # On déclenche à :55 de ces mêmes heures pour les deux fuseaux :
    #   Été  EDT (UTC-4) : minuit/4h/8h/12h/16h/20h Mtl → 04:55/08:55/12:55/16:55/20:55/00:55 UTC
    #   Hiver EST (UTC-5) : minuit/4h/8h/12h/16h/20h Mtl → 05:55/09:55/13:55/17:55/21:55/01:55 UTC
    # En dehors de la bonne saison, le run trouve des données déjà à jour → pas de commit → exit rapide.
    - cron: '55 4,8,12,16,20,0 * * *'  # EDT (été, UTC-4)
    - cron: '55 5,9,13,17,21,1 * * *'  # EST (hiver, UTC-5)
  workflow_dispatch:

concurrency:
  group: refresh-constellation
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-constellation-v3-${{ hashFiles('pipeline/build_data.R') }}
          restore-keys: r-constellation-v3-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev jq

      - name: Install R packages
        run: |
          install.packages(
            c("jsonlite", "dplyr", "purrr", "tidyr", "stringr", "readr"),
            repos = "https://cloud.r-project.org",
            INSTALL_opts = c("--no-help", "--no-html", "--no-docs")
          )
        shell: Rscript {0}

      - name: Fetch Athena data (Python boto3)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          AWS_DEFAULT_REGION: ca-central-1
        run: |
          pip install boto3 --quiet
          python3 pipeline/fetch_data.py

      - name: Build constellation data (R)
        run: Rscript pipeline/build_data.R

      - name: Commit & push updated data
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/graph.json site/timeseries.json site/monitor_input.json
          if git diff --staged --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh constellation data"
            git pull --rebase origin main
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger GitHub Pages deploy
        if: steps.commit_data.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-github-pages.yml --ref main

      - name: Validate live site is updated
        run: |
          set -euo pipefail

          expected_graph="$(jq -r '.meta.generated_at' site/graph.json)"
          expected_timeseries="$(jq -r '.meta.generated_at' site/timeseries.json)"

          echo "Expected graph.json meta.generated_at: ${expected_graph}"
          echo "Expected timeseries.json meta.generated_at: ${expected_timeseries}"

          for attempt in $(seq 1 30); do
            live_graph="$(curl -fsS https://radarplus.org/graph.json | jq -r '.meta.generated_at')"
            live_timeseries="$(curl -fsS https://radarplus.org/timeseries.json | jq -r '.meta.generated_at')"

            echo "Attempt ${attempt}/30 -> graph: ${live_graph} | timeseries: ${live_timeseries}"

            if [ "${live_graph}" = "${expected_graph}" ] && [ "${live_timeseries}" = "${expected_timeseries}" ]; then
              echo "Live site data is in sync with refreshed JSON files."
              exit 0
            fi

            sleep 20
          done

          echo "Timed out waiting for radarplus.org to serve the refreshed JSON files."
          exit 1

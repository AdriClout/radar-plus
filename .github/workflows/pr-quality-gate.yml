name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Block raw datasets and local secret files
        run: |
          set -euo pipefail
          blocked=0
          shopt -s nocasematch

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            file_list_cmd=(git log --name-only --pretty=format: "${{ github.event.pull_request.base.sha }}..${{ github.sha }}")
          else
            file_list_cmd=(git ls-files)
          fi

          while IFS= read -r file; do
            [ -z "${file}" ] && continue

            # Keep placeholder files allowed in data/ while blocking real payloads.
            if [[ "${file}" = data/* ]] \
              && [[ "${file}" != "data/.gitkeep" ]] \
              && [[ "${file}" != "data/README.md" ]]; then
              echo "::error file=${file}::Tracked file under data/ is not allowed"
              blocked=1
              continue
            fi

            if [[ "${file}" =~ \.(csv|tsv|parquet|feather|arrow|rds|sqlite|db|xls|xlsx)$ ]]; then
              echo "::error file=${file}::Raw or export data files are not allowed in git history"
              blocked=1
              continue
            fi

            if [[ "${file}" =~ (^|/)\.env[^/]*$ ]] \
              || [[ "${file}" =~ (^|/)\.Renviron$ ]] \
              || [[ "${file}" =~ \.(pem|key|p12)$ ]]; then
              echo "::error file=${file}::Local environment or secret material must not be versioned"
              blocked=1
            fi
          done < <("${file_list_cmd[@]}" | sed '/^$/d' | sort -u)

          if [ "${blocked}" -ne 0 ]; then
            echo "Blocked tracked files detected (raw datasets and/or secret files)."
            exit 1
          fi

      - name: Validate public JSON files
        run: |
          set -euo pipefail
          for f in site/*.json; do
            echo "Checking JSON: ${f}"
            jq empty "${f}"
          done

      - name: Validate internal links in HTML
        run: |
          set -euo pipefail
          missing=0

          while IFS= read -r html; do
            base_dir="$(dirname "${html}")"

            while IFS= read -r link; do
              [ -z "${link}" ] && continue

              # Decode common HTML entity found in attributes.
              link="${link//&amp;/&}"

              case "${link}" in
                http://*|https://*|mailto:*|tel:*|javascript:*|data:*|\#*|//*)
                  continue
                  ;;
              esac

              clean="${link%%\#*}"
              clean="${clean%%\?*}"
              [ -z "${clean}" ] && continue

              if [[ "${clean}" = /* ]]; then
                target=".${clean}"
              else
                target="${base_dir}/${clean}"
              fi

              if [ ! -e "${target}" ]; then
                echo "::error file=${html}::Broken local reference '${link}' -> '${target}'"
                missing=1
              fi
            done < <(
              xmllint --html --xpath '//@href | //@src' "${html}" 2>/dev/null \
                | sed -nE 's/^[[:space:]]*(href|src)="([^"]+)"[[:space:]]*$/\2/p' \
                || true
            )
          done < <(find site -maxdepth 1 -type f -name '*.html' | sort)

          if [ "${missing}" -ne 0 ]; then
            echo "Broken internal references found"
            exit 1
          fi

      - name: Lint workflow files (actionlint)
        uses: docker://rhysd/actionlint:1.7.7

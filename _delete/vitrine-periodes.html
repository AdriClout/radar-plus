<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vitrine Démocratique — Périodes v3</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1536px; height: 1024px; overflow: hidden; background: #000; }
  .scene {
    position: relative;
    width: 1536px;
    height: 1024px;
    background: url("original.png") center/cover no-repeat;
  }
  .icon-slot {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .label-slot {
    position: absolute;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .period-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 23px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.6);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .period-time {
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.88);
    letter-spacing: 2.5px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.95);
  }
</style>
</head>
<body>
<div class="scene">

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="gc" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gw" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gs" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="8" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
      </filter>
    </defs>
  </svg>

  <!-- PANEL 1 · MINUIT (x=128) -->
  <div class="icon-slot" style="left:128px; top:340px;">
    <svg width="104" height="104" viewBox="0 0 104 104" fill="none">
      <circle cx="52" cy="52" r="36" fill="rgba(6,4,18,0.97)" stroke="rgba(170,195,255,0.50)" stroke-width="1.5" filter="url(#gc)"/>
      <circle cx="52" cy="52" r="30" fill="none" stroke="rgba(130,155,240,0.10)" stroke-width="1"/>
      <circle cx="14" cy="20" r="2.2" fill="rgba(255,255,255,0.92)" filter="url(#gc)"/>
      <circle cx="88" cy="15" r="1.8" fill="rgba(255,255,255,0.75)"/>
      <circle cx="94" cy="72" r="2.3" fill="rgba(255,255,255,0.84)" filter="url(#gc)"/>
      <circle cx="16" cy="84" r="1.7" fill="rgba(255,255,255,0.68)"/>
      <path d="M88 15 L89.4 12 L90.8 15 L89.4 18 Z" fill="rgba(255,255,215,0.92)" filter="url(#gc)"/>
    </svg>
  </div>
  <div class="label-slot" style="left:128px; top:438px;">
    <span class="period-name">Minuit</span>
    <span class="period-time">19h – 23h</span>
  </div>

  <!-- PANEL 2 · NUIT (x=384) -->
  <div class="icon-slot" style="left:384px; top:325px;">
    <svg width="104" height="104" viewBox="0 0 104 104" fill="none">
      <path d="M 68 52 A 29 29 0 1 1 38 22 A 21 21 0 0 0 68 52 Z" fill="rgba(218,230,255,0.96)" filter="url(#gc)"/>
      <circle cx="78" cy="24" r="2.5" fill="rgba(255,255,255,0.95)" filter="url(#gc)"/>
      <circle cx="86" cy="60" r="1.8" fill="rgba(255,255,255,0.72)"/>
      <circle cx="76" cy="82" r="2.2" fill="rgba(255,255,255,0.80)" filter="url(#gc)"/>
      <path d="M78 24 L79.6 20 L81.2 24 L79.6 28 Z" fill="rgba(255,255,240,0.90)" filter="url(#gc)"/>
    </svg>
  </div>
  <div class="label-slot" style="left:384px; top:438px;">
    <span class="period-name">Nuit</span>
    <span class="period-time">23h – 3h</span>
  </div>

  <!-- PANEL 3 · MATIN (x=640) -->
  <div class="icon-slot" style="left:640px; top:310px;">
    <svg width="116" height="116" viewBox="0 0 116 116" fill="none">
      <ellipse cx="58" cy="82" rx="52" ry="12" fill="rgba(255,130,28,0.22)" filter="url(#gw)"/>
      <line x1="8" y1="80" x2="108" y2="80" stroke="rgba(255,198,100,0.80)" stroke-width="2.5" filter="url(#ds)"/>
      <path d="M 28 80 A 30 30 0 0 1 88 80" fill="rgba(255,172,38,0.97)" filter="url(#gw)"/>
      <path d="M 34 80 A 24 24 0 0 1 82 80" fill="rgba(255,215,68,0.92)"/>
      <path d="M 41 80 A 17 17 0 0 1 75 80" fill="rgba(255,242,118,0.76)"/>
      <g stroke="rgba(255,205,60,0.90)" stroke-width="2.5" stroke-linecap="round" filter="url(#ds)">
        <line x1="58" y1="20" x2="58" y2="36"/>
        <line x1="28" y1="32" x2="36" y2="43"/>
        <line x1="88" y1="32" x2="80" y2="43"/>
        <line x1="12" y1="58" x2="25" y2="62"/>
        <line x1="104" y1="58" x2="91" y2="62"/>
      </g>
    </svg>
  </div>
  <div class="label-slot" style="left:640px; top:438px;">
    <span class="period-name">Matin</span>
    <span class="period-time">3h – 7h</span>
  </div>

  <!-- PANEL 4 · MIDI (x=896) -->
  <div class="icon-slot" style="left:896px; top:295px;">
    <svg width="124" height="124" viewBox="0 0 124 124" fill="none">
      <circle cx="62" cy="62" r="52" fill="rgba(255,222,48,0.08)" filter="url(#gs)"/>
      <circle cx="62" cy="62" r="29" fill="rgba(255,232,50,0.98)" filter="url(#gs)"/>
      <circle cx="62" cy="62" r="18" fill="rgba(255,252,140,0.88)"/>
      <g stroke="rgba(255,215,38,0.95)" stroke-width="3.8" stroke-linecap="round" filter="url(#ds)">
        <line x1="62" y1="8"   x2="62" y2="24"/>
        <line x1="62" y1="100" x2="62" y2="116"/>
        <line x1="8"  y1="62"  x2="24" y2="62"/>
        <line x1="100" y1="62" x2="116" y2="62"/>
        <line x1="20"  y1="20" x2="31" y2="31"/>
        <line x1="93"  y1="93" x2="104" y2="104"/>
        <line x1="104" y1="20" x2="93"  y2="31"/>
        <line x1="31"  y1="93" x2="20"  y2="104"/>
      </g>
    </svg>
  </div>
  <div class="label-slot" style="left:896px; top:438px;">
    <span class="period-name">Midi</span>
    <span class="period-time">7h – 11h</span>
  </div>

  <!-- PANEL 5 · APRÈS-MIDI (x=1152) -->
  <div class="icon-slot" style="left:1152px; top:310px;">
    <svg width="124" height="104" viewBox="0 0 124 104" fill="none">
      <circle cx="40" cy="40" r="28" fill="rgba(255,190,32,0.94)" filter="url(#gw)"/>
      <g stroke="rgba(255,190,32,0.86)" stroke-width="2.5" stroke-linecap="round" filter="url(#gw)">
        <line x1="40" y1="5"  x2="40" y2="16"/>
        <line x1="8"  y1="40" x2="12" y2="40"/>
        <line x1="16" y1="16" x2="24" y2="24"/>
        <line x1="64" y1="16" x2="56" y2="24"/>
        <line x1="16" y1="64" x2="24" y2="56"/>
      </g>
      <ellipse cx="80" cy="68" rx="38" ry="20" fill="rgba(210,226,255,0.80)" filter="url(#ds)"/>
      <ellipse cx="62" cy="62" rx="28" ry="20" fill="rgba(225,238,255,0.90)"/>
      <ellipse cx="96" cy="65" rx="24" ry="17" fill="rgba(218,232,255,0.84)"/>
      <ellipse cx="80" cy="76" rx="38" ry="14" fill="rgba(228,240,255,0.95)"/>
    </svg>
  </div>
  <div class="label-slot" style="left:1152px; top:438px;">
    <span class="period-name" style="font-size:19px">Après-midi</span>
    <span class="period-time">11h – 15h</span>
  </div>

  <!-- PANEL 6 · SOIRÉE (x=1408) -->
  <div class="icon-slot" style="left:1408px; top:325px;">
    <svg width="104" height="104" viewBox="0 0 104 104" fill="none">
      <path d="M 67 47 A 27 27 0 1 1 40 18 A 19 19 0 0 0 67 47 Z" fill="rgba(255,210,110,0.96)" filter="url(#gw)"/>
      <circle cx="16" cy="22" r="2.4" fill="rgba(255,252,208,0.95)" filter="url(#gw)"/>
      <circle cx="84" cy="16" r="1.9" fill="rgba(255,248,198,0.80)"/>
      <circle cx="88" cy="70" r="2.3" fill="rgba(255,252,208,0.86)" filter="url(#gw)"/>
      <circle cx="14" cy="78" r="1.8" fill="rgba(255,244,188,0.70)"/>
      <path d="M16 22 L17.6 18 L19.2 22 L17.6 26 Z" fill="rgba(255,255,188,0.88)" filter="url(#gw)"/>
      <ellipse cx="52" cy="100" rx="44" ry="9" fill="rgba(215,65,22,0.16)" filter="url(#gw)"/>
    </svg>
  </div>
  <div class="label-slot" style="left:1408px; top:438px;">
    <span class="period-name">Soirée</span>
    <span class="period-time">15h – 19h</span>
  </div>

</div>
</body>
</html>
